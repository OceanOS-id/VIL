# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
ignore = [
    "RUSTSEC-2025-0009",   # ring 0.16 — AES panic (overflow-checks=false mitigates)
    "RUSTSEC-2025-0073",   # alloy-dyn-abi — DoS (transitive, blocked by serde pin)
    "RUSTSEC-2024-0421",   # idna — punycode (transitive via opcua)
    "RUSTSEC-2023-0071",   # rsa — Marvin attack (transitive)
    "RUSTSEC-2025-0137",   # ruint — unsound (transitive via alloy)
    "RUSTSEC-2026-0049",   # rustls-webpki (transitive)
    "RUSTSEC-2026-0009",   # time (transitive)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unlicense",
    "Unicode-3.0",
]
unlicensed = "allow"
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "encoding_rs"
expression = "(Apache-2.0 OR MIT) AND BSD-3-Clause"
license-files = [{ path = "COPYRIGHT", hash = 0x39f8ad31 }]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
