version: "3.0"
metadata:
  id: wasm-rules
  name: "WASM FaaS — Hot-Deployable Business Rules"
  description: |
    Pricing calculation via sandboxed WASM module. Pre-compiled .wasm loaded
    at startup, invoked per-request with zero-copy memory I/O. <1ms cold-start.

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /wasm/pricing }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: wasm-pricing
      activity_type: Function
      wasm_config:
        module_ref: pricing
        timeout_ms: 5000
      input_mappings:
        - target: function
          source: { language: spv1, source: '$.trigger_payload.body.function' }
        - target: args
          source: { language: spv1, source: '$.trigger_payload.body.args' }
      output_variable: pricing_result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: spv1
          source: '$.pricing_result'

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: wasm-pricing } }
    - { id: f2, from: { node: wasm-pricing }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: pricing_result, type: object }
