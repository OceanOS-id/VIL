version: "3.0"
metadata:
  id: wasm-rules
  name: "WASM FaaS — Hot-Deployable Business Rules"
  description: |
    Pricing calculation via sandboxed WASM module. Pre-compiled .wasm loaded
    at startup, invoked per-request with zero-copy memory I/O. <1ms cold-start.

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /wasm/pricing }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: wasm-pricing
      activity_type: Function
      wasm_config:
        module_ref: pricing
        function_name: calculate_price
        timeout_ms: 5000
      input_mappings:
        - target: product_id
          source: { language: vil-expr, source: trigger_payload.product_id }
        - target: quantity
          source: { language: vil-expr, source: trigger_payload.quantity }
        - target: customer_tier
          source: { language: vil-expr, source: 'trigger_payload.customer_tier ?? "standard"' }
      output_variable: pricing_result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: '{"price": pricing_result.total, "discount": pricing_result.discount, "tier": pricing_result.tier}'

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: wasm-pricing } }
    - { id: f2, from: { node: wasm-pricing }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: pricing_result, type: object }
