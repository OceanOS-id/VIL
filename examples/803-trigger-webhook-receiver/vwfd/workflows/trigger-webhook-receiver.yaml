version: "3.0"
metadata:
  id: trigger-webhook-receiver
  name: "Webhook Receiver with HMAC Verification"
  description: |
    HTTP webhook listener. Receives order events, extracts fields, returns ack.

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config:
          path: /webhook
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: extract-order
      activity_type: transform
      input_mappings:
        - target: order_event
          source:
            language: vil-expr
            source: |
              {
                "id": trigger_payload.body.id,
                "event": trigger_payload.body.event,
                "amount": trigger_payload.body.amount
              }
      output_variable: order_event

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: '{"status": "ack", "event_id": order_event.id}'

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: extract-order } }
    - { id: f2, from: { node: extract-order }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: order_event, type: object }
