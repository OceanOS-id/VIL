version: "3.0"
metadata:
  id: ab-infer
  name: "POST /api/ab/infer"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/ab/infer, method: POST }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload
    - id: handler
      activity_type: Function
      wasm_config: { module_ref: ab_infer_handler, function_name: main, timeout_ms: 5000 }
      input_mappings:
        - target: body
          source: { language: v-cel, source: trigger_payload.body }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: v-cel, source: result } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: handler } }
    - { id: f2, from: { node: handler }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
