version: "3.0"
metadata:
  id: ai-gw-vwfd-completion
  name: "AI Gateway Completion (VWFD) — stream-hit + aggregate-emit"
  description: |
    Business scenario: REST/JSON client that does not handle SSE.
    Typical call: curl | jq, Postman, non-browser clients that expect a
    single JSON body with Content-Length.
    Config axes:
      • connector.streaming = true              → fetch upstream SSE early (low TTFB)
      • activity.aggregate  = true              → collect all chunks, emit ONE payload
      • trigger.response_framing = length_prefixed → Content-Length header, no chunking
      • connector.json_tap  = delta.content     → per-chunk extraction (filter noise)
      • quick_transform wraps the aggregated content in a JSON envelope at the
        end — ordering: json_tap (per-chunk) → aggregate (build full payload)
        → quick_transform (reshape final). See vflow_io::quick_transform.
    Tradeoff: upstream SSE latency is absorbed (TTFB dominated by full response
    time), but client API is a simple { "content": "..." } JSON blob.

spec:
  durability:
    enabled: false

  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config:
          path: /api/gw/completion
        response_framing: length_prefixed   # transport: Content-Length: N
        end_activity: respond
      output_variable: trigger_payload

    - id: call_llm
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        streaming: true                     # upstream: hit SSE
        dialect: openai
        json_tap: "choices[0].delta.content" # per-chunk filter (stream mode)
        timeout_ms: 30000
      input_mappings:
        - target: url
          source:
            language: literal
            source: "http://127.0.0.1:4545/v1/chat/completions"
        - target: body
          source:
            language: vil-expr
            source: |
              {
                "model": "gpt-4",
                "messages": [{"role": "user", "content": trigger_payload.body.prompt}],
                "stream": true
              }
        - target: headers
          source:
            language: vil-expr
            source: '{"Content-Type": "application/json"}'
      output_variable: llm_result
      aggregate: true                       # emit: collect chunks → full payload

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: '{"content": llm_result.content}'

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: call_llm } }
    - { id: f2, from: { node: call_llm }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
