version: "3.0"
metadata:
  id: rag-basic-vector-search
  name: "Basic RAG with Vector Search"
  description: |
    Retrieval-Augmented Generation: embed user query → cosine similarity search
    against a static knowledge base (top-2 chunks) → build augmented prompt with
    retrieved context → LLM SSE completion → respond with answer + citations.
    Static KB is loaded at init (NativeCode), no external vector DB required.

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config:
          path: /api/rag
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    # Step 1: Embed query + cosine search top-2 from static KB
    - id: vector-search
      activity_type: Sidecar
      sidecar_config: { target: rag_embed_and_search, command: "python3 -u examples/301-rag-basic-vector-search/vwfd/sidecar/python/rag_embed_and_search.py", method: execute }
      input_mappings:
        - target: query
          source:
            language: spv1
            source: '$.trigger_payload.body.query'
        - target: top_k
          source:
            language: literal
            source: 2
      output_variable: retrieved_docs

    # Step 2: Build RAG prompt with retrieved context
    - id: build-prompt
      activity_type: transform
      input_mappings:
        - target: rag_prompt
          source:
            language: vil-expr
            source: |
              {
                "model": "gpt-4",
                "messages": [
                  {"role": "system", "content": "You are a helpful assistant. Answer the user question using ONLY the provided context. Cite sources as [Source N]. If the context does not contain the answer, say so."},
                  {"role": "user", "content": "Context:\n[Source 1] " + retrieved_docs.results[0].content + "\n[Source 2] " + retrieved_docs.results[1].content + "\n\nQuestion: " + trigger_payload.body.query}
                ],
                "stream": true
              }
      output_variable: rag_prompt

    # Step 3: LLM SSE call
    - id: llm-generate
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        streaming: true
        dialect: openai
        json_tap: "choices[0].delta.content"
        timeout_ms: 30000
      input_mappings:
        - target: url
          source:
            language: literal
            source: "http://127.0.0.1:4545/v1/chat/completions"
        - target: body
          source:
            language: spv1
            source: '$.rag_prompt'
      output_variable: llm_answer

    # Step 4: Respond with answer + citations
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: |
            {
              "content": llm_answer,
              "docs_used": retrieved_docs.results,
              "similarity_scores": retrieved_docs.scores
            }

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: vector-search } }
    - { id: f2, from: { node: vector-search }, to: { node: build-prompt } }
    - { id: f3, from: { node: build-prompt }, to: { node: llm-generate } }
    - { id: f4, from: { node: llm-generate }, to: { node: respond } }
    - { id: f5, from: { node: respond }, to: { node: end } }

  variables:
    - name: trigger_payload
      type: object
    - name: retrieved_docs
      type: object
    - name: rag_prompt
      type: object
    - name: llm_answer
      type: string
