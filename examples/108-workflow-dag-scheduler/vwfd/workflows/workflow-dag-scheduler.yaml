version: "3.0"
metadata:
  id: dag-scheduler
  name: "ETL DAG Scheduler"
  description: "POST /run — 5-task dependency DAG: extract → parallel validate+transform → load → notify"

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /run }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: process
      activity_type: NativeCode
      code_config:
        handler_ref: dag_etl_scheduler
        description: "POST /run — 5-task dependency DAG: extract → parallel validate+transform → load → notify"
      input_mappings:
        - target: input
          source: { language: spv1, source: '$.trigger_payload' }
      output_variable: result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: spv1
          source: '$.result'

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: result, type: object }
