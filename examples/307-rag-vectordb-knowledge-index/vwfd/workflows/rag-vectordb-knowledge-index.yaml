version: "3.0"
metadata:
  id: rag-vectordb-knowledge-index
  name: "Pure Vector Search (No LLM)"
  description: |
    Pure vector database search endpoint — NO LLM generation. Embed query →
    HNSW cosine similarity search → return top-k results with metadata
    (title, category, score, snippet). Useful as a standalone knowledge index
    API or as a building block for external RAG pipelines.

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config:
          path: /api/search/query
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    # Step 1: Embed query → HNSW cosine search → top-k with metadata
    - id: vector-search
      activity_type: NativeCode
      code_config:
        handler_ref: vectordb_hnsw_search
        description: "Embed the query text into a dense vector, then perform HNSW (Hierarchical Navigable Small World) approximate nearest-neighbor cosine search on the knowledge index. Returns top-k results with fields: doc_id, title, category, snippet, score, and metadata map. Configurable top_k (default 5) and min_score threshold."
      input_mappings:
        - target: query
          source:
            language: vil-expr
            source: trigger_payload.query
        - target: top_k
          source:
            language: vil-expr
            source: 'trigger_payload.top_k != null ? trigger_payload.top_k : 5'
        - target: min_score
          source:
            language: vil-expr
            source: 'trigger_payload.min_score != null ? trigger_payload.min_score : 0.0'
      output_variable: search_results

    # Step 2: Respond with search results (no LLM)
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: |
            {
              "results": search_results.hits,
              "total_hits": search_results.total,
              "query": trigger_payload.query,
              "top_k": search_results.top_k,
              "search_time_ms": search_results.search_ms
            }

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: vector-search } }
    - { id: f2, from: { node: vector-search }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - name: trigger_payload
      type: object
    - name: search_results
      type: object
