# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  007 — Non-Performing Loan Detection System — Runtime Config           ║
# ║  Business: Filters credit stream for NPL records (kol >= 3)           ║
# ║  Output: Only substandard/doubtful/loss credits for risk management    ║
# ╚══════════════════════════════════════════════════════════════════════════╝
# Layer 3: Full vil_workflow! macro (Decomposed Builder style)
gateway:
  port: 3081
  path: "/filter"
  upstream:
    url: "http://localhost:4545/v1/chat/completions"
    timeout_secs: 30
    format: sse
    json_tap: "choices[0].delta.content"

runtime:
  mode: shared
  shm:
    enabled: true
    pool_size: "16MB"

logging:
  level: info
  format: text
