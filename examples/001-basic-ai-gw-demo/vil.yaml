# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  001 — AI Inference Gateway (Production LLM Proxy) — Runtime Config    ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  Business: Centralizes all LLM API access behind a single gateway.     ║
# ║  Benefits: API key rotation, usage metering, rate limiting, caching.   ║
# ║  SHM mode ensures sub-microsecond token forwarding to consumers.       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# Gateway configuration — accepts POST /trigger from internal services
gateway:
  port: 3080
  path: "/trigger"
  upstream:
    url: "http://localhost:4545/v1/chat/completions"
    timeout_secs: 30
    format: sse
    json_tap: "choices[0].delta.content"

runtime:
  mode: shared
  shm:
    enabled: true
    pool_size: "16MB"

logging:
  level: info
  format: text
