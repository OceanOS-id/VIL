# vil_sdk sudah re-export semua yang diperlukan via prelude::*
# ─────────────────────────────────────────────────────────────────────────────
[dependencies]
vil_sdk  = { version = "0.2" }
vil_observer = { version = "0.2", features = ["runtime"] }
serde_json = "1.0"
