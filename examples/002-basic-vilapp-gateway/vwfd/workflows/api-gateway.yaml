version: "3.0"
metadata:
  id: api-gateway
  name: "API Gateway (VWFD)"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/proxy }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload
    - id: route_request
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        timeout_ms: 10000
      input_mappings:
        - target: url
          source: { language: vil-expr, source: '"http://127.0.0.1:4545/v1/chat/completions"' }
        - target: body
          source: { language: vil-expr, source: 'trigger_payload' }
      output_variable: backend_result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: '{"result": backend_result.body}'
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: route_request } }
    - { id: f2, from: { node: route_request }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
