[package]
name = "vil-basic-scripting-sandbox"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
vil_server = { version = "0.4", path = "../../crates/vil_server" }
vil_server_core = { version = "0.4", path = "../../crates/vil_server_core" }
vil_script_js = { path = "../../crates/vil_script_js" }
vil_json = { version = "0.4", path = "../../crates/vil_json" }
bytes = "1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
