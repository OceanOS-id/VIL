[package]
name = "vil-vwfd-db-vilorm-crud"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
vil_vwfd = { path = "../../../crates/vil_vwfd", features = ["connectors-db"] }
vil_db_sqlx = { path = "../../../crates/vil_db_sqlx" }
vil_orm = { path = "../../../crates/vil_orm" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["runtime-tokio", "any", "sqlite"] }
