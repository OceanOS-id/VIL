version: "3.0"
metadata: { id: list-posts, name: "GET /api/blog/posts — VilQuery JOIN" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/blog/posts, method: GET }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: query
      activity_type: Connector
      connector_config: { connector_ref: vastar.db.sqlite, operation: query }
      input_mappings:
        - target: sql
          source:
            language: literal
            source: "SELECT p.id, p.title, p.status, p.views, a.name as author_name FROM posts p JOIN authors a ON a.id = p.author_id ORDER BY p.created_at DESC LIMIT 100"
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: spv1, source: '$.result' } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: query } }
    - { id: f2, from: { node: query }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
