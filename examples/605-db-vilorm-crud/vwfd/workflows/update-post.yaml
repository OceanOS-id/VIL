version: "3.0"
metadata: { id: update-post, name: "PUT /api/blog/posts/:id — VilQuery update" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/blog/posts/, method: PUT }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: update
      activity_type: Connector
      connector_config: { connector_ref: vastar.db.sqlite, operation: execute }
      input_mappings:
        - target: sql
          source:
            language: vil_query
            source: |
              update("posts")
                .set_optional("title", trigger_payload.body.title)
                .set_optional("content", trigger_payload.body.content)
                .set_optional("status", trigger_payload.body.status)
                .where_eq("id", _path_param(trigger_payload.path, -1))
      output_variable: update_result
    - id: fetch
      activity_type: Connector
      connector_config: { connector_ref: vastar.db.sqlite, operation: query }
      input_mappings:
        - target: sql
          source:
            language: vil_query
            source: |
              select("posts")
                .columns("id, author_id, title, content, status, views, created_at")
                .where_eq("id", _path_param(trigger_payload.path, -1))
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: spv1
          source: '$.result'
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: update } }
    - { id: f2, from: { node: update }, to: { node: fetch } }
    - { id: f3, from: { node: fetch }, to: { node: respond } }
    - { id: f4, from: { node: respond }, to: { node: end } }
