version: "3.0"
metadata:
  id: flight-search
  name: "Flight Search Scatter-Gather"
  description: "POST /search/flights — gateway scatters query to 3 airline services → gathers + ranks results"

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/gateway/search/flights }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: process
      activity_type: NativeCode
      code_config:
        handler_ref: mesh_flight_scatter
        description: "POST /search/flights — gateway scatters query to 3 airline services → gathers + ranks results"
      input_mappings:
        - target: input
          source: { language: vil-expr, source: trigger_payload }
      output_variable: result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: result

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: result, type: object }
