version: "3.0"
metadata:
  id: db-vilorm-multitenant
  name: "VilORM Multi-Tenant — Create Tenant User"
  description: |
    Multi-tenant user creation: extract tenant_id from path param → insert user
    with _tenant_id prefix for row-level isolation → respond with created user.
    Tenant isolation is enforced by prefixing all entity operations with the
    tenant_id scope — this is a vflow-level pattern, not VIL infra.
    Endpoint: POST /api/tenants/:tenant_id/users  { "name": "...", "email": "...", "role": "..." }

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config:
          path: /api/tenants/:tenant_id/users
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    # Step 1: Insert user scoped to tenant via _tenant_id prefix
    - id: insert-tenant-user
      activity_type: Connector
      connector_config:
        connector_ref: vastar.db.sqlite
        operation: insert
        entity: users
      input_mappings:
        - target: data
          source:
            language: vil-expr
            source: |
              {
                "_tenant_id": trigger_payload.body.params.tenant_id,
                "name": trigger_payload.body.name,
                "email": trigger_payload.body.email,
                "role": trigger_payload.body.role,
                "created_at": now()
              }
      output_variable: created_user

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: |
            {
              "status": "created",
              "tenant_id": trigger_payload.body.params.tenant_id,
              "user": created_user
            }

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: insert-tenant-user } }
    - { id: f2, from: { node: insert-tenant-user }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - name: trigger_payload
      type: object
    - name: created_user
      type: object
