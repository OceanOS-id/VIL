[package]
name = "vil-db-vilorm-multitenant"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
vil_server = { version = "0.2" }
vil_server_core = { version = "0.2" }
vil_json = { version = "0.2" }
vil_db_sqlx = { version = "0.2", features = ["sqlite"] }
vil_orm = { version = "0.2" }
vil_orm_derive = { version = "0.2" }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "any"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1", features = ["v4"] }
bytes = "1"
