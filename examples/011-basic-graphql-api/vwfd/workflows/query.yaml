version: "3.0"
metadata: { id: gql-query, name: "POST /query" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/graphql/query, method: POST }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: handler
      activity_type: Function
      wasm_config: { module_ref: gql_query, function_name: query, timeout_ms: 5000 }
      input_mappings:
        - target: query
          source: { language: v-cel, source: 'trigger_payload.body.query' }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: v-cel, source: 'result' } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: handler } }
    - { id: f2, from: { node: handler }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
