version: "3.0"
metadata:
  id: villog-phase1-integration
  name: "VilLog Phase 1 Integration"
  description: |
    PoC: S3, MongoDB, ClickHouse, Elastic, Neo4j emitting db_log! events at 1-4 threads.
    This is a logging infrastructure demo — runs as CLI program, not HTTP server.
    NativeCode is the only valid pattern (no external service calls, no workflow).

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/villog-phase1-integration }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: process
      activity_type: NativeCode
      code_config:
        handler_ref: villog_phase1_integration
        description: "PoC: S3, MongoDB, ClickHouse, Elastic, Neo4j emitting db_log! events at 1-4 threads"
      output_variable: result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: v-cel
          source: result

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: result, type: object }
