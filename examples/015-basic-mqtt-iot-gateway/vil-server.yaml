# =============================================================================
# basic-usage-mqtt-iot-gateway — MQTT IoT gateway configuration
# =============================================================================
#
# Configures MQTT broker connection for the IoT gateway pattern.
# Sensors publish data via REST, which is bridged to MQTT topics.
# MQTT subscriptions feed back into the REST API for querying.

server:
  name: "mqtt-iot-gateway"
  port: 8080
  host: "0.0.0.0"
  request_timeout_secs: 30

logging:
  level: info

shm:
  enabled: true

middleware:
  cors:
    enabled: true
    mode: permissive
  request_tracker:
    enabled: true

mqtt:
  broker_url: "mqtt://localhost"
  port: 1883
  client_id: "vil-iot-gateway"
  keepalive_secs: 60
  tls: false
  qos: 1  # AtLeastOnce
  # credentials:
  #   username: "${MQTT_USER}"
  #   password: "${MQTT_PASSWORD}"

  subscriptions:
    - topic: "sensors/+/+"
      qos: 1
      description: "All sensor readings (wildcard: type and sensor_id)"

    - topic: "sensors/temperature/#"
      qos: 1
      description: "All temperature sensor readings (multi-level wildcard)"

    - topic: "commands/+/+"
      qos: 1
      description: "Device control commands (type and device_id)"

  bridge:
    target_service: "sensor-analytics"
    enabled: true
