[package]
name = "vil-basic-hybrid-wasm-sidecar"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
vil_server = { version = "0.4", path = "../../crates/vil_server" }
vil_server_core = { version = "0.4", path = "../../crates/vil_server_core" }
vil_server_macros = { version = "0.4", path = "../../crates/vil_server_macros" }
vil_sidecar = { version = "0.4", path = "../../crates/vil_sidecar" }
vil_capsule = { version = "0.4", path = "../../crates/vil_capsule" }
vil_json = { version = "0.4", path = "../../crates/vil_json" }
vil_log = { version = "0.4", path = "../../crates/vil_log" }
bytes = "1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
