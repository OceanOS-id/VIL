version: "3.0"
metadata:
  id: get-config
  name: "GET /config — Configuration"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /config, method: GET }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: handle
      activity_type: NativeCode
      code_config: { handler_ref: get_config }
      output_variable: result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: '$.result' }

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: handle } }
    - { id: f2, from: { node: handle }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
