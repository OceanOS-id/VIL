[package]
name = "vil-basic-plugin-database"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
vil_sdk = { version = "0.2" }
vil_server = { version = "0.2" }
vil_server_core = { version = "0.2" }
vil_json = { version = "0.2" }
vil_db_sqlx = { version = "0.2", features = ["postgres"] }
vil_orm = { version = "0.2" }
vil_orm_derive = { version = "0.2" }
bytes = "1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "any"] }
redis = { version = "0.27", features = ["tokio-comp"] }
tracing = "0.1"
