[package]
name = "vil-basic-plugin-database"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
vil_sdk = { path = "../../crates/vil_sdk" }
vil_server = { path = "../../crates/vil_server" }
vil_server_core = { path = "../../crates/vil_server_core" }
vil_json = { path = "../../crates/vil_json" }
vil_db_sqlx = { path = "../../crates/vil_db_sqlx", features = ["postgres"] }
bytes = "1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "any"] }
redis = { version = "0.27", features = ["tokio-comp"] }
tracing = "0.1"
