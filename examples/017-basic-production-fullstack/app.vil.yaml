vil_version: "6.0.0"
name: production-fullstack
port: 8080
metrics_port: 9090
prefix: /api

endpoints:
  - method: GET
    path: /
    handler: index
  - method: GET
    path: /stack
    handler: stack_info
  - method: GET
    path: /config
    handler: full_config
  - method: GET
    path: /sprints
    handler: sprints
  - method: GET
    path: /middleware
    handler: middleware_info
