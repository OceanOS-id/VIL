version: "3.0"
metadata:
  id: sse-standard
  name: "SSE Standard Dialect"
  description: "POST /stream — W3C SSE spec with done_marker and ShmToken transport"

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /stream }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: process
      activity_type: NativeCode
      code_config:
        handler_ref: sse_standard_stream
        description: "POST /stream — W3C SSE spec with done_marker and ShmToken transport"
      input_mappings:
        - target: input
          source: { language: vil-expr, source: trigger_payload }
      output_variable: result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: result

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: result, type: object }
