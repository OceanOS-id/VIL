[template]
id = "008-basic-credit-quality-monitor"
title = "Credit Quality Monitor"
description = "Credit Data Quality Assurance Pipeline"
default_port = 8080
default_upstream = ""
category = "basic"

[template.replace]
package_name = "vil-basic-credit-quality-monitor"
port = "8080"

[template.test]
type = "credit-simulator"
prereq = "cargo install credit-data-simulator && credit-data-simulator &"
port = 8080
method = "GET"
path = "/health"
expect_status = 200
