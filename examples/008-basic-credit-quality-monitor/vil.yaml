# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  008 — Credit Data Quality Assurance — Runtime Config                  ║
# ║  Business: Validates NIK, collectability, balances for data governance ║
# ╚══════════════════════════════════════════════════════════════════════════╝
# Layer 2: Pipeline builder style
gateway:
  port: 3082
  path: "/moderate"
  upstream:
    url: "http://localhost:4545/v1/chat/completions"
    timeout_secs: 30
    format: sse
    json_tap: "choices[0].delta.content"

runtime:
  mode: shared
  shm:
    enabled: true
    pool_size: "16MB"

logging:
  level: info
  format: text
