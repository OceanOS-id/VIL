version: "3.0"
metadata:
  id: credit-qa
  name: "Credit Data Quality Assurance (VWFD)"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/qa/validate }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload
    - id: validate_schema
      activity_type: Sidecar
      sidecar_config: { target: validate_credit_schema }
      output_variable: schema_result
    - id: validate_business
      activity_type: VRule
      rule_config: { rule_set_id: credit_qa_rules_v1 }
      output_variable: business_result
    - id: validate_cross_ref
      activity_type: NativeCode
      code_config: { handler_ref: cross_reference_check }
      output_variable: cross_ref_result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: v-cel
          source: '{"schema": schema_result, "business": business_result, "cross_ref": cross_ref_result}'
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: validate_schema } }
    - { id: f2, from: { node: validate_schema }, to: { node: validate_business } }
    - { id: f3, from: { node: validate_business }, to: { node: validate_cross_ref } }
    - { id: f4, from: { node: validate_cross_ref }, to: { node: respond } }
    - { id: f5, from: { node: respond }, to: { node: end } }
