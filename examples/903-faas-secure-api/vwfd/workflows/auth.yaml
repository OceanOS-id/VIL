version: "3.0"
metadata:
  id: secure-auth
  name: "POST /api/auth/token — Secure API (5 FaaS: crypto, jwt, webhook, regex, template)"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/auth/token, method: POST }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload
    - id: process
      activity_type: Transform
      input_mappings:
        - target: email_valid
          source: { language: vil-expr, source: 'regex_match(trigger_payload.body.email, "^[^@]+@[^@]+\\.[a-zA-Z]{2,}$")' }
        - target: token
          source: { language: vil-expr, source: 'jwt_sign(trigger_payload.body, "secret-key")' }
        - target: welcome
          source: { language: vil-expr, source: 'render_template("Welcome {{name}}", trigger_payload.body)' }
        - target: encrypted
          source: { language: vil-expr, source: 'aes_encrypt(trigger_payload.body.secret_data, "aes-256-key-here")' }
        - target: jwt_verified
          source: { language: vil-expr, source: 'jwt_verify(trigger_payload.body.existing_token, "secret-key")' }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: '$.result' }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
