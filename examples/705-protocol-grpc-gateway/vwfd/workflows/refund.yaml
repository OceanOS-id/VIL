version: "3.0"
metadata: { id: payment-refund, name: "POST /api/payments/refund" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/payments/refund, method: POST }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: handler
      activity_type: NativeCode
      code_config: { handler_ref: process_refund }
      input_mappings:
        - target: body
          source: { language: spv1, source: '$.trigger_payload.body' }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: spv1, source: '$.result' } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: handler } }
    - { id: f2, from: { node: handler }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
