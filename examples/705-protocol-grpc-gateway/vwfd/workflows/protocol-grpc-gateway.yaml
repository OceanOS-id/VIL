version: "3.0"
metadata:
  id: protocol-grpc-gateway
  name: "Payment Gateway — gRPC Stream Charge Processing"
  description: |
    Receives payment charge requests via gRPC server-streaming from an upstream
    payment orchestrator. Each streamed message = one charge request. Validates
    card (Luhn + expiry), processes charge, stores to ledger via NativeCode.
    gRPC trigger: connects to payment orchestrator stream at grpc://localhost:50051
    Service: PaymentService, Method: StreamCharges

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: grpc
        grpc:
          endpoint: "http://localhost:50051"
          service: "PaymentService"
          method: "StreamCharges"
      output_variable: trigger_payload

    # Step 1: Validate card — Luhn algorithm + expiry date check
    - id: validate-card
      activity_type: Function
      wasm_config:
        module_ref: payment_validate_card
        description: |
          Validates credit card number using Luhn algorithm (double every second
          digit from right, sum digits, check mod 10 == 0). Also validates expiry
          date is not in the past. Returns { valid: bool, card_type: string, errors: [] }.
      input_mappings:
        - target: card_number
          source:
            language: spv1
            source: '$.trigger_payload.body.card_number'
        - target: expiry
          source:
            language: spv1
            source: '$.trigger_payload.body.expiry'
      output_variable: validation

    # Step 2: Process payment — generate ID, store in in-memory ledger
    - id: process-payment
      activity_type: Function
      wasm_config:
        module_ref: payment_process_charge
        description: |
          Generates a unique payment ID (pay_XXXX), stores the charge record in
          the in-memory payment ledger with status/timestamp, and returns the
          charge result. Skips processing if card validation failed.
      input_mappings:
        - target: card_number
          source:
            language: spv1
            source: '$.trigger_payload.body.card_number'
        - target: amount_cents
          source:
            language: spv1
            source: '$.trigger_payload.body.amount_cents'
        - target: currency
          source:
            language: spv1
            source: '$.trigger_payload.body.currency'
        - target: customer_id
          source:
            language: spv1
            source: '$.trigger_payload.body.customer_id'
        - target: validation
          source:
            language: spv1
            source: '$.validation'
      output_variable: charge_result

    # Step 3: Store charge result to ledger (NativeCode for stateful write)
    - id: store-ledger
      activity_type: NativeCode
      code_config: { handler_ref: store_charge }
      input_mappings:
        - target: charge
          source:
            language: spv1
            source: '$.charge_result'
        - target: customer_id
          source:
            language: spv1
            source: '$.trigger_payload.body.customer_id'
      output_variable: ledger_result

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: validate-card } }
    - { id: f2, from: { node: validate-card }, to: { node: process-payment } }
    - { id: f3, from: { node: process-payment }, to: { node: store-ledger } }
    - { id: f4, from: { node: store-ledger }, to: { node: end } }

  variables:
    - name: trigger_payload
      type: object
    - name: validation
      type: object
    - name: charge_result
      type: object
    - name: ledger_result
      type: object
