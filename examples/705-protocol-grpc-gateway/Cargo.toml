[package]
name = "vil-protocol-grpc-gateway"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
vil_grpc = { version = "0.4", path = "../../crates/vil_grpc" }
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[build-dependencies]
tonic-build = "0.12"
