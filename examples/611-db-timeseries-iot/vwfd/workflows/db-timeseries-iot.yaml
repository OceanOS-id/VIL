version: "3.0"
metadata:
  id: db-timeseries-iot
  name: "IoT Timeseries — Sensor Data Write"
  description: |
    IoT sensor data ingestion into a timeseries database. Receives sensor
    readings (device_id, metric, value, timestamp) → Connector write to
    timeseries DB → respond with write confirmation.
    Endpoint: POST /api/sensors/write  { "device_id": "...", "metric": "temperature", "value": 23.5, "timestamp": "..." }

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config:
          path: /api/sensors/write
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    # Step 1: Write sensor data point to timeseries DB
    - id: write-datapoint
      activity_type: Connector
      connector_config:
        connector_ref: vastar.db.timeseries
        operation: write
      input_mappings:
        - target: measurement
          source:
            language: spv1
            source: '$.trigger_payload.body.metric'
        - target: tags
          source:
            language: vil-expr
            source: |
              {
                "device_id": trigger_payload.body.device_id
              }
        - target: fields
          source:
            language: vil-expr
            source: |
              {
                "value": trigger_payload.body.value
              }
        - target: timestamp
          source:
            language: vil-expr
            source: 'trigger_payload.body.timestamp != null ? trigger_payload.body.timestamp : now()'
      output_variable: write_result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: |
            {
              "status": "ok",
              "sensor_id": trigger_payload.body.sensor_id,
              "timestamp": write_result.timestamp,
              "total_readings": write_result.total_readings
            }

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: write-datapoint } }
    - { id: f2, from: { node: write-datapoint }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - name: trigger_payload
      type: object
    - name: write_result
      type: object
