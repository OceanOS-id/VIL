version: "3.0"
metadata:
  id: trading-processor
  name: "HFT Data Processor (VWFD)"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/trade/process }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload
    - id: process
      activity_type: Function
      wasm_config: { module_ref: process_trade_data
        function_name: execute }
      input_mappings:
        - target: trades
          source: { language: vil-expr, source: 'trigger_payload.trades' }
      output_variable: processed
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: 'processed'
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
