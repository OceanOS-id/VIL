version: "3.0"
metadata:
  id: delete-task
  name: "DELETE /tasks/:id — Delete task (pure VilQuery)"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/tasks/tasks/, method: DELETE }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: fetch
      activity_type: Connector
      connector_config:
        connector_ref: vastar.db.sqlite
        operation: find_one
      input_mappings:
        - target: sql
          source:
            language: vil-expr
            source: '"SELECT * FROM tasks WHERE id = ''" + trigger_payload.path.split("/").last() + "''"'
      output_variable: task

    - id: delete
      activity_type: Connector
      connector_config:
        connector_ref: vastar.db.sqlite
        operation: execute
      input_mappings:
        - target: sql
          source:
            language: vil-expr
            source: '"DELETE FROM tasks WHERE id = ''" + trigger_payload.path.split("/").last() + "''"'
      output_variable: delete_result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: 'task'

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: fetch } }
    - { id: f2, from: { node: fetch }, to: { node: delete } }
    - { id: f3, from: { node: delete }, to: { node: respond } }
    - { id: f4, from: { node: respond }, to: { node: end } }
