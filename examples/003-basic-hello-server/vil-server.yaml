# =============================================================================
# basic-usage-hello-server — Minimal vil-server configuration
# =============================================================================

server:
  name: "hello-server"
  port: 8080
  host: "0.0.0.0"
  request_timeout_secs: 30

logging:
  level: info

shm:
  enabled: true

middleware:
  cors:
    enabled: true
    mode: permissive
