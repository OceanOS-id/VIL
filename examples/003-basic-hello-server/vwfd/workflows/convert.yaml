version: "3.0"
metadata: { id: convert, name: "POST /api/fx/convert" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/fx/convert, method: POST }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: handler
      activity_type: Function
      wasm_config: { module_ref: currency_convert, function_name: execute }
      input_mappings:
        - target: operation
          source: { language: literal, source: "convert" }
        - target: from
          source: { language: spv1, source: '$.trigger_payload.body.from' }
        - target: to
          source: { language: spv1, source: '$.trigger_payload.body.to' }
        - target: amount
          source: { language: spv1, source: '$.trigger_payload.body.amount' }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: spv1, source: '$.result' } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: handler } }
    - { id: f2, from: { node: handler }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
