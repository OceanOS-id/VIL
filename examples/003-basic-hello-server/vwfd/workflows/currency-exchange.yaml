version: "3.0"
metadata:
  id: currency-exchange
  name: "Currency Exchange Service (VWFD)"
  description: |
    3 routes handled by WASM module with operation routing:
    GET  /api/fx/rates   → operation=rates
    POST /api/fx/convert → operation=convert (with validation)
    GET  /api/fx/stats   → operation=stats
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/fx }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: route
      activity_type: Function
      wasm_config:
        module_ref: currency_convert
        function_name: execute
        timeout_ms: 5000
      input_mappings:
        # Determine operation from path + method
        - target: operation
          source:
            language: vil-expr
            source: |
              trigger_payload.path == "/api/fx/rates" ? "rates" :
              trigger_payload.path == "/api/fx/stats" ? "stats" :
              "convert"
        - target: from
          source: { language: vil-expr, source: 'trigger_payload.body.from' }
        - target: to
          source: { language: vil-expr, source: 'trigger_payload.body.to' }
        - target: amount
          source: { language: vil-expr, source: 'trigger_payload.body.amount' }
        - target: conversion_id
          source: { language: literal, source: "1" }
        - target: total_conversions
          source: { language: literal, source: "0" }
        - target: total_volume_idr
          source: { language: literal, source: "0" }
        - target: uptime_secs
          source: { language: literal, source: "0" }
      output_variable: result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: 'result'

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: route } }
    - { id: f2, from: { node: route }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
