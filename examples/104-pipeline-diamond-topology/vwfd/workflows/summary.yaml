version: "3.0"
metadata: { id: diamond-summary, name: "POST /diamond — NPL summary view" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /diamond, method: POST }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: fetch
      activity_type: Connector
      connector_config: { connector_ref: vastar.http, operation: get, streaming: true, format: ndjson, timeout_ms: 30000 }
      input_mappings:
        - target: url
          source: { language: literal, source: "http://127.0.0.1:18081/api/v1/credits/ndjson?count=100" }
      output_variable: credit_records
    - id: transform
      activity_type: NativeCode
      code_config: { handler_ref: summary_view }
      input_mappings:
        - target: records
          source: { language: spv1, source: '$.credit_records' }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: spv1, source: '$.result' } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: fetch } }
    - { id: f2, from: { node: fetch }, to: { node: transform } }
    - { id: f3, from: { node: transform }, to: { node: respond } }
    - { id: f4, from: { node: respond }, to: { node: end } }
