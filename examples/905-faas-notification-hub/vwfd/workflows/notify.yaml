version: "3.0"
metadata:
  id: notify
  name: "POST /api/notify — Notification Hub (5 FaaS: email, webhook, template, mask, id_gen)"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/notify, method: POST }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload
    - id: process
      activity_type: Transform
      input_mappings:
        - target: notification_id
          source: { language: v-cel, source: 'ulid()' }
        - target: email_body
          source: { language: v-cel, source: 'render_template("Dear {{name}}, order {{order_id}} confirmed.", trigger_payload.body)' }
        - target: masked_email
          source: { language: v-cel, source: 'mask_pii(trigger_payload.body.email, "email")' }
        - target: masked_phone
          source: { language: v-cel, source: 'mask_pii(trigger_payload.body.phone, "phone")' }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: v-cel, source: 'result' }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
