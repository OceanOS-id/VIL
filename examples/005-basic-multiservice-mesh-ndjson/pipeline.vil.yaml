# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  005 — Core Banking Data Ingestion (Multi-Service Mesh)                ║
# ║                                                                         ║
# ║  Business Context:                                                      ║
# ║    Ingests credit portfolio data from the Core Banking System via       ║
# ║    NDJSON streaming. Each record is enriched with OJK risk category    ║
# ║    and LTV (Loan-to-Value) ratio before forwarding to analytics.       ║
# ║    Handles bulk credit data for daily reconciliation and reporting.     ║
# ║                                                                         ║
# ║  gateway (:3084/ingest) ──> processor (NDJSON) ──> response back       ║
# ║  Token: ShmToken (multi-pipeline, zero-copy)                           ║
# ║                                                                         ║
# ║  Build:  vil compile --from yaml --input pipeline.vil.yaml          ║
# ║  Run:    vil run --file pipeline.vil.yaml                           ║
# ║  Viz:    vil viz pipeline.vil.yaml --open                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

vil_version: "6.0.0"
name: multiservice-mesh
port: 3084
token: shm                # multi-pipeline, zero-copy SHM

# ── Semantic Types ────────────────────────────────────────────────────────

semantic_types:
  - name: MeshState
    kind: state
    fields:
      - { name: request_id, type: u64 }
      - { name: messages_forwarded, type: u32 }
      - { name: active_pipelines, type: u8 }

  - name: MeshForwarded
    kind: event
    fields:
      - { name: request_id, type: u64 }
      - { name: target_service, type: u32 }
      - { name: lane, type: u8 }
      - { name: latency_us, type: u64 }

  - name: MeshFault
    kind: fault
    variants:
      - ProcessorTimeout
      - AnalyticsTimeout
      - ShmWriteFailed
      - RouteNotFound

# ── Nodes ─────────────────────────────────────────────────────────────────

nodes:
  gateway:
    type: http-sink
    port: 3084
    path: /ingest
    ports:
      trigger_out:      { direction: out, lane: trigger }
      response_data_in: { direction: in,  lane: data }
      response_ctrl_in: { direction: in,  lane: control }

  processor:
    type: http-source
    url: "http://127.0.0.1:4545/v1/chat/completions"
    format: sse
    # ── SSE Dialect ─────────────────────────────────────────────────────
    #   openai     — done: "data: [DONE]"              tap: choices[0].delta.content
    #   anthropic  — done: "event: message_stop"       tap: delta.text
    #   ollama     — done: {"done": true} in JSON      tap: message.content
    #   cohere     — done: "event: message-end"         tap: text
    #   gemini     — done: TCP EOF                      tap: candidates[0].content.parts[0].text
    #   standard   — done: TCP EOF                      tap: (none, raw data)
    #   custom     — provide your own: dialect_done_marker, dialect_done_event, dialect_done_json
    dialect: openai
    json_tap: "choices[0].delta.content"
    ports:
      trigger_in:        { direction: in,  lane: trigger }
      response_data_out: { direction: out, lane: data }
      response_ctrl_out: { direction: out, lane: control }
    post_body:
      model: "gpt-4"
      messages:
        - role: "system"
          content: "Process and analyze the incoming data payload."
        - role: "user"
          content: "Analyze this request."
      stream: true

# ── Routes (Tri-Lane) ────────────────────────────────────────────────────

routes:
  # Trigger: gateway forwards request to processor
  - { from: gateway.trigger_out, to: processor.trigger_in, mode: LoanWrite }
  # Data: SSE chunks stream back (zero-copy via SHM)
  - { from: processor.response_data_out, to: gateway.response_data_in, mode: LoanWrite }
  # Control: DONE/error signals
  - { from: processor.response_ctrl_out, to: gateway.response_ctrl_in, mode: Copy }
