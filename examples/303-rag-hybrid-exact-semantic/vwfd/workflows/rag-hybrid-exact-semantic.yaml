version: "3.0"
metadata:
  id: rag-hybrid-exact-semantic
  name: "Hybrid RAG: Exact Match + Semantic Fallback"
  description: |
    Two-tier retrieval: first check exact match against FAQ trigger phrases.
    If exact hit found, respond instantly without LLM (fast path). If no exact
    match, fall back to keyword scoring + semantic search, then augment with
    LLM for a natural answer. ExclusiveGateway routes between the two paths.

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config:
          path: /api/hybrid
        response_mode: buffered
        end_activity: respond-exact
      output_variable: trigger_payload

    # Step 1: Exact match check on FAQ triggers
    - id: exact-match
      activity_type: Sidecar
      sidecar_config: { target: rag_exact_match_check, command: "python3 -u examples/303-rag-hybrid-exact-semantic/vwfd/sidecar/python/rag_hybrid_search.py", method: execute }
      input_mappings:
        - target: query
          source:
            language: spv1
            source: '$.trigger_payload.body.query'
      output_variable: exact_result

    # Gateway: exact hit or semantic fallback
    - id: route-gate
      activity_type: ExclusiveGateway

    # Branch A: Exact hit — respond instantly, no LLM
    - id: respond-exact
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: |
            {
              "content": exact_result.answer,
              "search_tier": "exact",
              "llm_used": false,
              "matched_faq": exact_result.faq_id
            }

    - id: end-exact
      activity_type: End

    # Branch B: No exact match — keyword scoring + LLM augment
    - id: keyword-search
      activity_type: Sidecar
      sidecar_config: { target: rag_keyword_score, command: "python3 -u examples/303-rag-hybrid-exact-semantic/vwfd/sidecar/python/rag_hybrid_search.py", method: execute }
      input_mappings:
        - target: query
          source:
            language: spv1
            source: '$.trigger_payload.body.query'
        - target: top_k
          source:
            language: literal
            source: 3
      output_variable: keyword_results

    # LLM augments the keyword results into a natural answer
    - id: llm-augment
      activity_type: Connector
      connector_config:
        connector_ref: vastar.http
        operation: post
        streaming: true
        dialect: openai
        json_tap: "choices[0].delta.content"
        timeout_ms: 30000
      input_mappings:
        - target: url
          source:
            language: literal
            source: "http://127.0.0.1:4545/v1/chat/completions"
        - target: body
          source:
            language: vil-expr
            source: |
              {
                "model": "gpt-4",
                "messages": [
                  {"role": "system", "content": "You are a helpful assistant. Synthesize the provided context into a clear answer. If context is insufficient, say so."},
                  {"role": "user", "content": "Context:\n" + keyword_results.context_text + "\n\nQuestion: " + trigger_payload.body.query}
                ],
                "stream": true
              }
      output_variable: llm_answer

    - id: respond-semantic
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: vil-expr
          source: |
            {
              "content": llm_answer,
              "search_tier": "semantic+llm",
              "llm_used": true,
              "matched_faq": null
            }

    - id: end-semantic
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: exact-match } }
    - { id: f2, from: { node: exact-match }, to: { node: route-gate } }
    # Branch A: exact hit
    - id: f3-exact
      from: { node: route-gate }
      to: { node: respond-exact }
      condition: "exact_result.matched == true"
      priority: 1
    - { id: f4, from: { node: respond-exact }, to: { node: end-exact } }
    # Branch B: semantic fallback (default)
    - id: f5-fallback
      from: { node: route-gate }
      to: { node: keyword-search }
      priority: 0
    - { id: f6, from: { node: keyword-search }, to: { node: llm-augment } }
    - { id: f7, from: { node: llm-augment }, to: { node: respond-semantic } }
    - { id: f8, from: { node: respond-semantic }, to: { node: end-semantic } }

  variables:
    - name: trigger_payload
      type: object
    - name: exact_result
      type: object
    - name: keyword_results
      type: object
    - name: llm_answer
      type: string
