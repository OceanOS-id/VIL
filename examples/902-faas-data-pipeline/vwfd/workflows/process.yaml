version: "3.0"
metadata:
  id: data-process
  name: "POST /api/data/process — Data Pipeline (5 FaaS: csv, xml, schema, reshape, stats)"
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        webhook_config: { path: /api/data/process, method: POST }
        response_mode: buffered
        end_activity: respond
      output_variable: trigger_payload

    - id: process
      activity_type: Transform
      input_mappings:
        - target: csv_result
          source: { language: vil-expr, source: 'parse_csv(trigger_payload.body.csv_data, ",", true)' }
        - target: schema_valid
          source: { language: vil-expr, source: 'validate_schema(trigger_payload.body.data, trigger_payload.body.schema)' }
        - target: scores_mean
          source: { language: vil-expr, source: 'mean(trigger_payload.body.scores)' }
        - target: scores_stdev
          source: { language: vil-expr, source: 'stdev(trigger_payload.body.scores)' }
        - target: xml_result
          source: { language: vil-expr, source: 'parse_xml(trigger_payload.body.xml_data)' }
        - target: reshaped
          source: { language: vil-expr, source: 'reshape(trigger_payload.body.data, trigger_payload.body.shape)' }
      output_variable: result

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response: { language: spv1, source: '$.result' }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: process } }
    - { id: f2, from: { node: process }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
