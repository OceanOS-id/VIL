vil_version: "6.0.0"
name: websocket-chat
port: 8080
mode: server

services:
  - name: chat
    prefix: /api/chat
    endpoints:
      - method: GET
        path: /
        handler: index
      - method: GET
        path: /ws
        handler: ws_handler
      - method: GET
        path: /stats
        handler: stats
