version: "3.0"
metadata: { id: ws-chat, name: "Customer Support Chat (VWFD)" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/chat/send }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: process_message
      activity_type: Sidecar
      sidecar_config: { target: process_chat_message
        method: execute }
      output_variable: response
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: v-cel, source: 'response' } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: process_message } }
    - { id: f2, from: { node: process_message }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
