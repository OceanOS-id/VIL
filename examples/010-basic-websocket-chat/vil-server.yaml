# =============================================================================
# basic-usage-websocket-chat — WebSocket broadcast chat room
# =============================================================================
#
# Basic vil-server configuration for the WebSocket chat example.
# The chat uses tokio::sync::broadcast for fan-out to all connected clients.

server:
  name: "websocket-chat"
  port: 8080
  host: "0.0.0.0"
  request_timeout_secs: 30

logging:
  level: info

shm:
  enabled: true

middleware:
  cors:
    enabled: true
    mode: permissive
