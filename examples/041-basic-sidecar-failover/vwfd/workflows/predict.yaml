version: "3.0"
metadata: { id: score-predict, name: "POST /api/score/predict" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/score/predict, method: POST }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: score
      activity_type: Sidecar
      sidecar_config: { target: ml_scorer, method: execute }
      input_mappings:
        - target: operation
          source: { language: literal, source: "predict" }
        - target: body
          source: { language: v-cel, source: 'trigger_payload.body' }
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: v-cel, source: 'result' } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: score } }
    - { id: f2, from: { node: score }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
