[package]
name = "vil-storage-multi-cloud"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
vil_server = { path = "../../crates/vil_server" }
vil_server_core = { path = "../../crates/vil_server_core" }
vil_json = { path = "../../crates/vil_json" }
bytes = "1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1", features = ["v4"] }
