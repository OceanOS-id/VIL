version: "3.0"
metadata: { id: get-product, name: "GET /api/shop/products/:id" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/shop/products/, method: GET }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: query
      activity_type: Connector
      connector_config: { connector_ref: vastar.db.sqlite, operation: find_one }
      input_mappings:
        - target: sql
          source:
            language: vil-expr
            source: '"SELECT * FROM products WHERE id = ''" + trigger_payload.path.split("/").last() + "''"'
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config: { trigger_ref: trigger, final_response: { language: spv1, source: '$.result' } }
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: query } }
    - { id: f2, from: { node: query }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }
