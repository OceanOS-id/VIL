version: "3.0"
metadata: { id: create-product, name: "POST /api/shop/products — VilQuery insert" }
spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config: { trigger_type: webhook, webhook_config: { path: /api/shop/products, method: POST }, response_mode: buffered, end_activity: respond }
      output_variable: trigger_payload
    - id: insert
      activity_type: Connector
      connector_config: { connector_ref: vastar.db.sqlite, operation: execute }
      input_mappings:
        - target: sql
          source:
            language: vil_query
            source: |
              insert("products")
                .columns("id, name, description, price, stock, category")
                .values(_uuid(), trigger_payload.body.name, trigger_payload.body.description ?? "", trigger_payload.body.price ?? 0, trigger_payload.body.stock ?? 0, trigger_payload.body.category ?? "")
      output_variable: insert_result
    - id: fetch
      activity_type: Connector
      connector_config: { connector_ref: vastar.db.sqlite, operation: query }
      input_mappings:
        - target: sql
          source:
            language: vil_query
            source: |
              select("products")
                .columns("id, name, description, price, stock, category, created_at")
                .order_by("created_at DESC")
                .limit(1)
      output_variable: result
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: spv1
          source: '$.result'
    - id: end
      activity_type: End
  flows:
    - { id: f1, from: { node: trigger }, to: { node: insert } }
    - { id: f2, from: { node: insert }, to: { node: fetch } }
    - { id: f3, from: { node: fetch }, to: { node: respond } }
    - { id: f4, from: { node: respond }, to: { node: end } }
