[package]
name = "vil-db-vilorm-overhead-bench"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
vil_server = { path = "../../crates/vil_server" }
vil_server_core = { path = "../../crates/vil_server_core" }
vil_json = { path = "../../crates/vil_json" }
vil_db_sqlx = { path = "../../crates/vil_db_sqlx", features = ["sqlite"] }
vil_orm = { path = "../../crates/vil_orm" }
vil_orm_derive = { path = "../../crates/vil_orm_derive" }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "any"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = "1"
uuid = { version = "1", features = ["v4"] }
