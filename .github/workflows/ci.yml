name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude vil-basic-ai-gw-demo --exclude vil-multi-pipeline-benchmark

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude vil-basic-ai-gw-demo --exclude vil-multi-pipeline-benchmark -- --skip integration

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude vil-basic-ai-gw-demo --exclude vil-multi-pipeline-benchmark --all-targets
        # Note: warnings are enforced via .cargo/config.toml lints, not -D warnings flag

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Security: Rust Advisory DB ──
  audit:
    name: Security Audit (RustSec)
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block on known advisories in transitive deps
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Security: OSV Scanner (OpenSSF) ──
  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    continue-on-error: true  # Informational — don't block PRs
    steps:
      - uses: actions/checkout@v4
      - name: Install OSV Scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
      - name: Scan Cargo.lock
        run: osv-scanner --lockfile Cargo.lock

  # ── License & Dependency Policy ──
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    continue-on-error: true  # Informational until all advisories are resolved
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
