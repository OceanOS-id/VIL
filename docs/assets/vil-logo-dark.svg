<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b68ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e040a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff" />
      <stop offset="100%" style="stop-color:#e040a0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="420" rx="24" fill="#0a0e27"/>

  <!-- V shape (Vastar-inspired geometric) -->
  <g transform="translate(200,160)" fill="none" stroke="url(#grad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer V -->
    <path d="M-100,-100 L0,80 L100,-100" />
    <!-- Inner V (smaller, represents the "intermediate layer") -->
    <path d="M-55,-55 L0,35 L55,-55" stroke-width="12" opacity="0.6"/>
    <!-- Tri-Lane: 3 horizontal lines inside -->
    <line x1="-65" y1="-70" x2="65" y2="-70" stroke-width="4" opacity="0.4"/>
    <line x1="-45" y1="-35" x2="45" y2="-35" stroke-width="4" opacity="0.4"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke-width="4" opacity="0.4"/>
  </g>

  <!-- Text: VIL -->
  <text x="200" y="340" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="700" fill="url(#textgrad)" letter-spacing="8">VIL</text>

  <!-- Subtitle -->
  <text x="200" y="375" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" fill="#8890b0" letter-spacing="4">VASTAR INTERMEDIATE LANGUAGE</text>
</svg>
