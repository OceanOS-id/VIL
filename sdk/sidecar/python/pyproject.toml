[project]
name = "vil-sidecar"
version = "0.1.0"
description = "VIL Sidecar SDK — Write sidecar handlers in Python with zero-copy SHM IPC"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["vil_sidecar*"]
