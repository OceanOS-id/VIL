[package]
name = "vil_db_redis"
version = "0.1.2"
edition = "2021"
description = "VIL Database Plugin — Redis cache, pub/sub, session store"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "MIT OR Apache-2.0"

[dependencies]
vil_server_db = { version = "0.1.0", path = "../vil_server_db" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }

tokio = { version = "1", features = ["full"] }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dashmap = "5.5"
