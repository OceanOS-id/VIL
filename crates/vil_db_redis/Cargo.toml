[package]
name = "vil_db_redis"
version = "0.1.0"
edition = "2021"
description = "VIL Database Plugin — Redis cache, pub/sub, session store"
license = "Apache-2.0"

[dependencies]
vil_server_db = { path = "../vil_server_db" }
vil_server_core = { path = "../vil_server_core" }

tokio = { version = "1", features = ["full"] }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
dashmap = "5.5"
