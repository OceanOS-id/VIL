[package]
name = "vil_server_macros"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "VIL server handler proc-macros"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"

[dev-dependencies]
vil_server_core = { path = "../vil_server_core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
axum = "0.7"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
