[package]
name = "vil_server_macros"
version.workspace = true
edition = "2021"
license = "MIT OR Apache-2.0"
description = "VIL server handler proc-macros"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"

[dev-dependencies]
vil_server_core = { version = "0.4", path = "../vil_server_core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
axum = "0.7"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
