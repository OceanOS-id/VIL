[package]
name = "vil_rag"
version = "0.1.0"
edition = "2021"
description = "VIL RAG Plugin — Retrieval-Augmented Generation pipeline (chunk, embed, store, retrieve, generate)"

[dependencies]
vil_sdk = { path = "../vil_sdk" }
vil_server_core = { path = "../vil_server_core" }
vil_server = { path = "../vil_server" }
vil_llm = { path = "../vil_llm" }
vil_json = { path = "../vil_json" }
vil_macros = { path = "../vil_macros" }

tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
axum = { version = "0.7", features = ["macros"] }
