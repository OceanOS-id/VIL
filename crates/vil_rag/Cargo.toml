[package]
name = "vil_rag"
version = "0.1.0"
edition = "2021"
description = "VIL RAG Plugin — Retrieval-Augmented Generation pipeline (chunk, embed, store, retrieve, generate)"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
vil_sdk = { version = "0.1.0", path = "../vil_sdk" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }
vil_server = { version = "0.1.0", path = "../vil_server" }
vil_llm = { version = "0.1.0", path = "../vil_llm" }
vil_json = { version = "0.1.0", path = "../vil_json" }
vil_macros = { version = "0.1.0", path = "../vil_macros" }

tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
axum = { version = "0.7", features = ["macros"] }
