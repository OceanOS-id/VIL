[package]
name = "vil_sdk"
description = "VIL Official SDK - Public Facade for 3rd Party Developers"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true

[dependencies]
# In a real IP-protected scenario, this would link against a binary (.a/.so)
# We now depend on vil_engine which is built as a staticlib + rlib facade.
vil_engine = { path = "../vil_engine" }
vil_types = { path = "../vil_types" }
vil_new_http = { path = "../vil_new_http" }
vil_macros = { path = "../vil_macros" }
vil_ir = { path = "../vil_ir" }
vil_validate = { path = "../vil_validate" }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = "1.0"
