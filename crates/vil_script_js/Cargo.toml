[package]
name = "vil_script_js"
version = "0.1.1"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "VIL JavaScript script runtime — sandboxed JS execution for workflow tasks"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
publish = false

[features]
default = []
js = ["boa_engine"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
boa_engine = { version = "0.20", optional = true }
