[package]
name = "vil_server_core"
version = "0.1.16"
edition = "2021"
description = "VIL Server Core — Axum-based HTTP engine with zero-copy SHM bridge"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "MIT OR Apache-2.0"

[dependencies]
vil_capsule = { version = "0.1.0", path = "../vil_capsule" }
# HTTP framework
axum = { version = "0.7", features = ["macros", "ws"] }
hyper = { version = "1.0", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio"] }
tokio = { version = "1", features = ["full"] }
tower = { version = "0.4", features = ["full"] }
tower-http = { version = "0.5", features = ["cors", "trace", "compression-gzip", "limit", "fs"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# Tracing / logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
vil_log = { workspace = true }
rmp-serde = "1.3"

# SSE client for VlangApp handlers
reqwest = { version = "0.12", features = ["json", "stream"] }
futures = "0.3"

# Utilities
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
bytes = "1.0"
dashmap = "5.5"
futures-core = "0.3"
itoa = "1.0"
aes-gcm = "0.10"
getrandom = "0.2"

# VIL internal
vil_obs = { version = "0.1.0", path = "../vil_obs" }
vil_rt = { version = "0.1.0", path = "../vil_rt" }
vil_shm = { version = "0.1.0", path = "../vil_shm" }
vil_types = { version = "0.1.0", path = "../vil_types" }
vil_json = { version = "0.1.0", path = "../vil_json", features = ["simd"] }
vil_sidecar = { version = "0.1.0", path = "../vil_sidecar" }
vil_observer = { version = "0.1.5", path = "../vil_observer", default-features = false }
