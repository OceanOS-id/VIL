[package]
name = "vil_tokenizer"
version = "0.1.0"
edition = "2021"
description = "VIL Tokenizer Engine — native Rust BPE tokenization for LLM token counting and text splitting"

[dependencies]
vil_sdk = { path = "../vil_sdk" }
vil_server_core = { path = "../vil_server_core" }
vil_server = { path = "../vil_server" }
vil_macros = { path = "../vil_macros" }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"
regex = "1"
axum = { version = "0.7", features = ["macros"] }
