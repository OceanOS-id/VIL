[package]
name = "vil_sidecar"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
license = "Apache-2.0"
description = "VIL Sidecar Protocol — SHM IPC for external process integration"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full", "net"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
rmp-serde = "1.3"
bytes = "1.0"

# Shared memory
memmap2 = "0.9"

# Concurrency
dashmap = "5.5"

# Logging
vil_log = { workspace = true }

# VIL internal
vil_types = { version = "0.1.0", path = "../vil_types" }

[features]
default = ["msgpack"]
msgpack = []

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tempfile = "3"
