[package]
name = "vil_lsp"
version = "0.1.0"
edition = "2021"
description = "VIL Language Server — diagnostics, completions, and hover for VIL macros"

[[bin]]
name = "vil-lsp"
path = "src/main.rs"

[dependencies]
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
