[package]
name = "vil_mq_nats"
version = "0.1.0"
edition = "2021"
description = "VIL NATS Adapter — Core pub/sub, JetStream, KV Store, Tri-Lane bridge"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "Apache-2.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
async-nats = "0.37"
vil_log = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1.3"
bytes = "1.0"
dashmap = "5.5"
futures = "0.3"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
