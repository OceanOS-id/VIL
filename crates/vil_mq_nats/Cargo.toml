[package]
name = "vil_mq_nats"
version = "0.1.0"
edition = "2021"
description = "VIL NATS Adapter — Core pub/sub, JetStream, KV Store, Tri-Lane bridge"
license = "Apache-2.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
async-nats = "0.37"
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
bytes = "1.0"
dashmap = "5.5"
futures = "0.3"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
