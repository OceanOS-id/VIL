[package]
name = "vil_json"
version.workspace = true
edition = "2021"
license = "MIT OR Apache-2.0"
description = "VIL zero-copy JSON abstraction with optional SIMD acceleration"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[features]
default = []
simd = ["sonic-rs"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = "1"

[dependencies.sonic-rs]
version = "0.3"
optional = true
