[package]
name = "vil_json"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "VIL zero-copy JSON abstraction with optional SIMD acceleration"

[features]
default = []
simd = ["sonic-rs"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = "1"

[dependencies.sonic-rs]
version = "0.3"
optional = true
