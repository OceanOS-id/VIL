[package]
name = "vil_vwfd_macros"
version.workspace = true
edition = "2021"
description = "VIL VWFD Macro — declarative workflow definition in Rust"
license = "MIT OR Apache-2.0"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"
