[package]
name = "vil_vwfd_macros"
version.workspace = true
edition = "2021"
description = "VIL VWFD Macro — declarative workflow definition in Rust. Source-available under VSAL — see LICENSE-VSAL. Not published to crates.io."
license-file = "../../LICENSE-VSAL"
publish = false

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"
