[package]
name = "vil_server"
version = "0.1.0"
edition = "2021"
description = "VIL Server — Process-oriented modular server for Rust. Zero-copy SHM, Tri-Lane protocol, built on Axum."
license = "Apache-2.0"

[dependencies]
# VIL Server crates
vil_server_core = { path = "../vil_server_core" }
vil_server_web = { path = "../vil_server_web" }
vil_server_config = { path = "../vil_server_config" }
vil_server_mesh = { path = "../vil_server_mesh" }
vil_server_auth = { path = "../vil_server_auth" }
vil_server_db = { path = "../vil_server_db" }

# VIL macros
vil_macros = { path = "../vil_macros" }
vil_server_macros = { path = "../vil_server_macros" }
vil_json = { path = "../vil_json" }

# VIL SDK (needed for semantic type macros: vil_state, vil_event, etc.)
vil_sdk = { path = "../vil_sdk" }

# VIL observability
vil_obs = { path = "../vil_obs" }
vil_log = { path = "../vil_log" }

# Re-export essentials
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
