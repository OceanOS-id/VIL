[package]
name = "vil_expr"
version.workspace = true
edition = "2021"
description = "VIL Expression Evaluator (VIL Expression compatible) — path access, concat, compare, JSON templates"
license = "MIT OR Apache-2.0"

[dependencies]
serde_json = "1.0"
thiserror = "1.0"

# Built-in FaaS (all optional, feature-gated)
vil_hash = { path = "../vil_hash", optional = true }
vil_crypto = { path = "../vil_crypto", optional = true }
vil_jwt = { path = "../vil_jwt", optional = true }
vil_id_gen = { path = "../vil_id_gen", optional = true }
vil_datefmt = { path = "../vil_datefmt", optional = true }
vil_duration = { path = "../vil_duration", optional = true }
vil_parse_csv = { path = "../vil_parse_csv", optional = true }
vil_parse_xml = { path = "../vil_parse_xml", optional = true }
vil_regex = { path = "../vil_regex", optional = true }
vil_phone = { path = "../vil_phone", optional = true }
vil_validate_schema = { path = "../vil_validate_schema", optional = true }
vil_mask = { path = "../vil_mask", optional = true }
vil_reshape = { path = "../vil_reshape", optional = true }
vil_template = { path = "../vil_template", optional = true }
vil_email_validate = { path = "../vil_email_validate", optional = true }
vil_stats = { path = "../vil_stats", optional = true }
vil_anomaly = { path = "../vil_anomaly", optional = true }
vil_email = { path = "../vil_email", optional = true }
vil_webhook_out = { path = "../vil_webhook_out", optional = true }
vil_geodist = { path = "../vil_geodist", optional = true }

[features]
default = []
faas-core = [
    "dep:vil_hash", "dep:vil_crypto", "dep:vil_jwt", "dep:vil_id_gen",
    "dep:vil_datefmt", "dep:vil_duration",
    "dep:vil_parse_csv", "dep:vil_parse_xml",
    "dep:vil_regex", "dep:vil_phone",
]
faas-full = [
    "faas-core",
    "dep:vil_validate_schema", "dep:vil_mask", "dep:vil_reshape",
    "dep:vil_template", "dep:vil_email_validate",
    "dep:vil_stats", "dep:vil_anomaly",
    "dep:vil_email", "dep:vil_webhook_out", "dep:vil_geodist",
]

[dev-dependencies]
serde_json = "1.0"
