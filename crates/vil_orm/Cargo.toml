[package]
name = "vil_orm"
version = "0.1.2"
edition = "2021"
description = "VIL ORM — Process-oriented zero-copy ORM built on sqlx"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
license = "MIT OR Apache-2.0"

[dependencies]
vil_orm_derive = { version = "0.1.2", path = "../vil_orm_derive" }
vil_db_sqlx = { version = "0.1", path = "../vil_db_sqlx", features = ["sqlite"] }
vil_server_core = { version = "0.1", path = "../vil_server_core" }
vil_log = { version = "0.1", path = "../vil_log" }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "any"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
