[package]
name = "vil_llm"
version = "0.1.0"
edition = "2021"
description = "VIL LLM Plugin — multi-provider LLM abstraction (chat, streaming, embeddings)"

[dependencies]
vil_sdk = { version = "0.1.0", path = "../vil_sdk" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }
vil_server = { version = "0.1.0", path = "../vil_server" }
vil_json = { version = "0.1.0", path = "../vil_json" }
vil_macros = { version = "0.1.0", path = "../vil_macros" }
vil_log = { workspace = true }

tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json", "stream"] }
async-trait = "0.1"
tracing = "0.1"
bytes = "1"
futures = "0.3"
axum = { version = "0.7", features = ["macros"] }
