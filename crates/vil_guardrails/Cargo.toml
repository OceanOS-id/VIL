[package]
name = "vil_guardrails"
version = "0.1.0"
edition = "2021"
description = "VIL Content Guardrails Engine — PII detection, toxicity scoring, custom rules (H07)"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
vil_prompt_shield = { version = "0.1.0", path = "../vil_prompt_shield" }
vil_macros        = { version = "0.1.0", path = "../vil_macros" }
vil_server_core   = { version = "0.1.0", path = "../vil_server_core" }
vil_sdk = { version = "0.1.0", path = "../vil_sdk" }
vil_server = { version = "0.1.0", path = "../vil_server" }
axum = { version = "0.7", features = ["macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1"
aho-corasick = "1"
