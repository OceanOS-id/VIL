[package]
name = "vil_guardrails"
version = "0.1.0"
edition = "2021"
description = "VIL Content Guardrails Engine — PII detection, toxicity scoring, custom rules (H07)"

[dependencies]
vil_prompt_shield = { path = "../vil_prompt_shield" }
vil_macros        = { path = "../vil_macros" }
vil_server_core   = { path = "../vil_server_core" }
vil_sdk = { path = "../vil_sdk" }
vil_server = { path = "../vil_server" }
axum = { version = "0.7", features = ["macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1"
aho-corasick = "1"
