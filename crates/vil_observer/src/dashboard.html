<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIL Observer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222632;
    --border: #2a2e3a;
    --text: #e1e4eb;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: #4a63b8;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header h1 span {
    color: var(--accent);
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .card-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .card-value.green { color: var(--green); }
  .card-value.red { color: var(--red); }
  .card-value.accent { color: var(--accent); }

  .card-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .table-header h2 {
    font-size: 14px;
    font-weight: 600;
  }

  .table-header .refresh-info {
    font-size: 11px;
    color: var(--text-dim);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    padding: 10px 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 12px 20px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr:hover {
    background: var(--surface-hover);
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  .method-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .method-GET { background: #1a3a2a; color: var(--green); }
  .method-POST { background: #1a2a4a; color: var(--accent); }
  .method-PUT { background: #3a3a1a; color: var(--yellow); }
  .method-DELETE { background: #3a1a1a; color: var(--red); }
  .method-PATCH { background: #2a1a3a; color: #c084fc; }

  .path-cell { font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; font-size: 12px; }

  .error-rate {
    font-weight: 600;
  }

  .error-rate.ok { color: var(--green); }
  .error-rate.warn { color: var(--yellow); }
  .error-rate.bad { color: var(--red); }

  .latency { font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; font-size: 12px; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  @media (max-width: 640px) {
    main { padding: 12px; }
    .cards { grid-template-columns: 1fr; }
    thead th, tbody td { padding: 8px 12px; }
  }
</style>
</head>
<body>
<header>
  <h1><span>VIL</span> Observer</h1>
  <div class="status-badge">
    <div class="status-dot"></div>
    <span id="status-text">Connected</span>
  </div>
</header>
<main>
  <div class="cards">
    <div class="card">
      <div class="card-label">Total Requests</div>
      <div class="card-value accent" id="total-requests">0</div>
      <div class="card-sub" id="rps-info">-</div>
    </div>
    <div class="card">
      <div class="card-label">Error Rate</div>
      <div class="card-value green" id="error-rate">0.00%</div>
      <div class="card-sub" id="error-info">0 errors</div>
    </div>
    <div class="card">
      <div class="card-label">Uptime</div>
      <div class="card-value" id="uptime">0s</div>
      <div class="card-sub" id="uptime-info">since start</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <h2>Endpoints</h2>
      <span class="refresh-info">Auto-refresh every 5s</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Method</th>
          <th>Path</th>
          <th>Requests</th>
          <th>Errors</th>
          <th>Error Rate</th>
          <th>Avg Latency</th>
          <th>Min</th>
          <th>Max</th>
        </tr>
      </thead>
      <tbody id="endpoints-body">
        <tr><td colspan="8" class="empty-state">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
(function() {
  const API_URL = '/_vil/api/metrics';
  const REFRESH_MS = 5000;
  let prevTotal = 0;
  let prevTime = Date.now();

  function formatUptime(secs) {
    if (secs < 60) return secs + 's';
    if (secs < 3600) return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    return h + 'h ' + m + 'm';
  }

  function formatLatency(us) {
    if (us === 0) return '-';
    if (us < 1000) return us + 'us';
    if (us < 1000000) return (us / 1000).toFixed(1) + 'ms';
    return (us / 1000000).toFixed(2) + 's';
  }

  function errorRateClass(rate) {
    if (rate < 0.01) return 'ok';
    if (rate < 0.05) return 'warn';
    return 'bad';
  }

  function numberWithCommas(x) {
    return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  async function refresh() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      // Summary cards
      const totalReqs = data.total_requests || 0;
      document.getElementById('total-requests').textContent = numberWithCommas(totalReqs);

      const now = Date.now();
      const dt = (now - prevTime) / 1000;
      if (dt > 0 && prevTotal > 0) {
        const rps = ((totalReqs - prevTotal) / dt).toFixed(1);
        document.getElementById('rps-info').textContent = rps + ' req/s';
      }
      prevTotal = totalReqs;
      prevTime = now;

      const endpoints = data.endpoints || [];
      let totalErrors = 0;
      endpoints.forEach(function(e) { totalErrors += e.errors; });
      const globalRate = totalReqs > 0 ? totalErrors / totalReqs : 0;
      const rateEl = document.getElementById('error-rate');
      rateEl.textContent = (globalRate * 100).toFixed(2) + '%';
      rateEl.className = 'card-value ' + (globalRate < 0.01 ? 'green' : (globalRate < 0.05 ? 'yellow' : 'red'));
      document.getElementById('error-info').textContent = numberWithCommas(totalErrors) + ' errors';

      document.getElementById('uptime').textContent = formatUptime(data.uptime_secs || 0);

      // Endpoints table
      const tbody = document.getElementById('endpoints-body');
      if (endpoints.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No endpoints registered yet</td></tr>';
      } else {
        tbody.innerHTML = endpoints.map(function(e) {
          const cls = errorRateClass(e.error_rate);
          return '<tr>'
            + '<td><span class="method-badge method-' + e.method + '">' + e.method + '</span></td>'
            + '<td class="path-cell">' + e.path + '</td>'
            + '<td>' + numberWithCommas(e.requests) + '</td>'
            + '<td>' + numberWithCommas(e.errors) + '</td>'
            + '<td><span class="error-rate ' + cls + '">' + (e.error_rate * 100).toFixed(2) + '%</span></td>'
            + '<td class="latency">' + formatLatency(e.avg_latency_us) + '</td>'
            + '<td class="latency">' + formatLatency(e.min_latency_us) + '</td>'
            + '<td class="latency">' + formatLatency(e.max_latency_us) + '</td>'
            + '</tr>';
        }).join('');
      }

      document.getElementById('status-text').textContent = 'Connected';
      document.querySelector('.status-dot').style.background = 'var(--green)';
    } catch (err) {
      document.getElementById('status-text').textContent = 'Disconnected';
      document.querySelector('.status-dot').style.background = 'var(--red)';
    }
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
})();
</script>
</body>
</html>
