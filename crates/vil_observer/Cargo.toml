[package]
name = "vil_observer"
version = "0.1.0"
edition = "2021"
description = "VIL Observer Dashboard — embedded web UI for service monitoring"

[dependencies]
axum = { version = "0.7", features = ["macros", "ws"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
