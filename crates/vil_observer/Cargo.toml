[package]
name = "vil_observer"
version = "0.1.3"
edition = "2021"
license = "Apache-2.0"
description = "VIL Observer Dashboard — embedded web UI for service monitoring"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
axum = { version = "0.7", features = ["macros", "ws"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
vil_log = { workspace = true }
vil_connector_macros = { workspace = true }

# Optional: for sidecar .attach() to auto-wire VastarRuntimeWorld
vil_rt = { workspace = true, optional = true }
vil_new_http = { workspace = true, optional = true }

[features]
default = []
runtime = ["vil_rt", "vil_new_http"]
