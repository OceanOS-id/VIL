[package]
name = "vil_db_sqlx"
version = "0.1.0"
edition = "2021"
description = "VIL Database Plugin — PostgreSQL, MySQL, SQLite via sqlx"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "Apache-2.0"

[features]
default = ["sqlite"]
postgres = ["sqlx/postgres"]
mysql = ["sqlx/mysql"]
sqlite = ["sqlx/sqlite"]
all = ["postgres", "mysql", "sqlite"]

[dependencies]
vil_server_db = { version = "0.1.0", path = "../vil_server_db" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }

sqlx = { version = "0.8", features = ["runtime-tokio", "any"] }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
dashmap = "5.5"
