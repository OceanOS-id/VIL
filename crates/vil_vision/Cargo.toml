[package]
name = "vil_vision"
version = "0.1.0"
edition = "2021"
description = "VIL Image Understanding — infrastructure and traits for image analysis and embedding (I04)"

[dependencies]
vil_sdk          = { path = "../vil_sdk" }
vil_server_core  = { path = "../vil_server_core" }
vil_server       = { path = "../vil_server" }
vil_macros       = { path = "../vil_macros" }
axum               = { version = "0.7", features = ["macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
