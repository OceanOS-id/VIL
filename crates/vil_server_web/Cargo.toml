[package]
name = "vil_server_web"
version = "0.1.1"
edition = "2021"
description = "VIL Server Web — Handler utilities, validation, error handling, OpenAPI"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "MIT OR Apache-2.0"

[dependencies]
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }

axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
validator = { version = "0.20", features = ["derive"] }
tracing = "0.1"
http = "1.0"
