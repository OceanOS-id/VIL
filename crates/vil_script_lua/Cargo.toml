[package]
name = "vil_script_lua"
version.workspace = true
edition = "2021"
license = "MIT OR Apache-2.0"
description = "VIL Lua script runtime — sandboxed Lua execution for workflow tasks"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
publish = false

[features]
default = []
lua = ["mlua"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
mlua = { version = "0.10", features = ["lua54", "serialize"], optional = true }
