[package]
name = "vil_script_lua"
version = "0.1.0"
edition = "2021"
description = "VIL Lua script runtime — sandboxed Lua execution for workflow tasks"
publish = false

[features]
default = []
lua = ["mlua"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
mlua = { version = "0.10", features = ["lua54", "serialize"], optional = true }
