[package]
name = "vil_server_auth"
version = "0.1.2"
edition = "2021"
description = "VIL Server Auth — JWT validation, rate limiting, security middleware"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "MIT OR Apache-2.0"

[dependencies]
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }
vil_log = { workspace = true }
tracing = { workspace = true }

axum = "0.7"
tokio = { version = "1", features = ["full"] }
tower = "0.4"
http = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1.3"
jsonwebtoken = "9"
dashmap = "5.5"
uuid = { version = "1.0", features = ["v4"] }
getrandom = "0.2"
sha2 = "0.10"
subtle = "2.5"
