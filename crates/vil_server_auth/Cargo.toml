[package]
name = "vil_server_auth"
version = "0.1.0"
edition = "2021"
description = "VIL Server Auth — JWT validation, rate limiting, security middleware"
license = "Apache-2.0"

[dependencies]
vil_server_core = { path = "../vil_server_core" }

axum = "0.7"
tokio = { version = "1", features = ["full"] }
tower = "0.4"
http = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
jsonwebtoken = "9"
tracing = "0.1"
dashmap = "5.5"
uuid = { version = "1.0", features = ["v4"] }
