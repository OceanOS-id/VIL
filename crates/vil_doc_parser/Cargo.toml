[package]
name = "vil_doc_parser"
version = "0.1.0"
edition = "2021"
description = "VIL Native Document Parser — zero-dependency Markdown, HTML, plain-text, and CSV parsing for RAG pipelines"

[dependencies]
vil_sdk = { version = "0.1.0", path = "../vil_sdk" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }
vil_server = { version = "0.1.0", path = "../vil_server" }
vil_macros = { version = "0.1.0", path = "../vil_macros" }
axum = { version = "0.7", features = ["macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1"
