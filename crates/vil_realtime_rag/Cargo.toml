[package]
name = "vil_realtime_rag"
version = "0.1.2"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "VIL Real-Time RAG — sub-millisecond retrieval for latency-critical applications"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
vil_embedder     = { version = "0.1.0", path = "../vil_embedder" }
vil_tokenizer    = { version = "0.1.0", path = "../vil_tokenizer" }
vil_macros       = { version = "0.1.0", path = "../vil_macros" }
vil_server_core  = { version = "0.1.0", path = "../vil_server_core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
vil_sdk = { version = "0.1.0", path = "../vil_sdk" }
vil_server = { version = "0.1.0", path = "../vil_server" }
axum = { version = "0.7", features = ["macros"] }
