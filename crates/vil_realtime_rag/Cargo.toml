[package]
name = "vil_realtime_rag"
version = "0.1.0"
edition = "2021"
description = "VIL Real-Time RAG — sub-millisecond retrieval for latency-critical applications"

[dependencies]
vil_embedder     = { path = "../vil_embedder" }
vil_tokenizer    = { path = "../vil_tokenizer" }
vil_macros       = { path = "../vil_macros" }
vil_server_core  = { path = "../vil_server_core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
vil_sdk = { path = "../vil_sdk" }
vil_server = { path = "../vil_server" }
axum = { version = "0.7", features = ["macros"] }
