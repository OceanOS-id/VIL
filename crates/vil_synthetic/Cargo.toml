[package]
name = "vil_synthetic"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "N02 — Synthetic Data Generator: template-based generation with quality checking"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
async-trait = "0.1"

vil_sdk = { version = "0.3", path = "../vil_sdk" }
vil_server_core = { version = "0.3", path = "../vil_server_core" }
vil_server = { version = "0.3", path = "../vil_server" }
vil_macros = { version = "0.3", path = "../vil_macros" }
axum = { version = "0.7", features = ["macros"] }
[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
