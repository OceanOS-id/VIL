[package]
name = "vil_embedder"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "VIL Embedding Engine — high-performance text embeddings with batching and SIMD similarity"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
async-trait = "0.1"
tracing = "0.1"
vil_sdk = { version = "0.1.0", path = "../vil_sdk" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }
vil_server = { version = "0.1.0", path = "../vil_server" }
vil_macros = { version = "0.1.0", path = "../vil_macros" }
axum = { version = "0.7", features = ["macros"] }
