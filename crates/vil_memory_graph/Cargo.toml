[package]
name = "vil_memory_graph"
version = "0.1.0"
edition = "2021"
description = "VIL Memory Graph — persistent knowledge graph for agent long-term memory"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "Apache-2.0"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dashmap = "5.5"
parking_lot = "0.12"
vil_macros = { version = "0.1.0", path = "../vil_macros" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }
vil_sdk = { version = "0.1.0", path = "../vil_sdk" }
vil_server = { version = "0.1.0", path = "../vil_server" }
axum = { version = "0.7", features = ["macros"] }
