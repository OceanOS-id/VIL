[package]
name = "vil_server_db"
version = "0.1.0"
edition = "2021"
description = "VIL Server DB — Database connection pooling and transaction support"
license = "Apache-2.0"

[dependencies]
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }

tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
async-trait = "0.1"
