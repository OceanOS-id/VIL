[package]
name = "vil_server_db"
version.workspace = true
edition = "2021"
description = "VIL Server DB — Database connection pooling and transaction support"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "MIT OR Apache-2.0"

[dependencies]
vil_server_core = { version = "0.2", path = "../vil_server_core" }

tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1.3"
async-trait = "0.1"
vil_log = { workspace = true }
tracing = { workspace = true }
