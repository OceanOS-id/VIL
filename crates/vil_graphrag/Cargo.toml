[package]
name = "vil_graphrag"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "VIL Knowledge Graph RAG — entity extraction, graph building, graph-enhanced retrieval (I02)"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
vil_sdk          = { version = "0.1.0", path = "../vil_sdk" }
vil_server_core  = { version = "0.1.0", path = "../vil_server_core" }
vil_server       = { version = "0.1.0", path = "../vil_server" }
vil_macros       = { version = "0.1.0", path = "../vil_macros" }
vil_memory_graph = { version = "0.1.0", path = "../vil_memory_graph" }
vil_llm = { version = "0.1.0", path = "../vil_llm" }
axum               = { version = "0.7", features = ["macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
regex = "1"
