[package]
name = "vil_graphrag"
version = "0.1.0"
edition = "2021"
description = "VIL Knowledge Graph RAG — entity extraction, graph building, graph-enhanced retrieval (I02)"

[dependencies]
vil_sdk          = { path = "../vil_sdk" }
vil_server_core  = { path = "../vil_server_core" }
vil_server       = { path = "../vil_server" }
vil_macros       = { path = "../vil_macros" }
vil_memory_graph = { path = "../vil_memory_graph" }
vil_llm = { path = "../vil_llm" }
axum               = { version = "0.7", features = ["macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
regex = "1"
