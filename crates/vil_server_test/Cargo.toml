[package]
name = "vil_server_test"
version.workspace = true
edition = "2021"
description = "VIL Server Test — Integration test harness and benchmark suite"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "MIT OR Apache-2.0"

[dependencies]
vil_server_core = { version = "0.2", path = "../vil_server_core" }
vil_server = { version = "0.2", path = "../vil_server" }

axum = "0.7"
tokio = { version = "1", features = ["full"] }
hyper = { version = "1.0", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio"] }
tower = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
bytes = "1.0"
http-body-util = "0.1"

[dev-dependencies]
vil_server_auth = { version = "0.2", path = "../vil_server_auth" }
vil_server_mesh = { version = "0.2", path = "../vil_server_mesh" }
vil_server_web = { version = "0.2", path = "../vil_server_web" }
vil_db_semantic = { version = "0.2", path = "../vil_db_semantic" }
