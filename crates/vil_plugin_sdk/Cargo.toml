[package]
name = "vil_plugin_sdk"
version.workspace = true
edition = "2021"
license = "MIT OR Apache-2.0"
description = "VIL Plugin SDK — Stable interface for building community VIL plugins"
repository = "https://github.com/AbrahamUjang/vil"
keywords = ["vil", "plugin", "sdk"]

[dependencies]
vil_server_core = { version = "0.4", path = "../vil_server_core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
