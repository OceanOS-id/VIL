[package]
name = "vil_operator"
version = "0.1.0"
edition = "2021"
description = "VIL Kubernetes Operator — CRD-based deployment of vil-server"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "Apache-2.0"

[[bin]]
name = "vil-operator"
path = "src/main.rs"

[dependencies]
kube = { version = "0.98", features = ["runtime", "derive"] }
k8s-openapi = { version = "0.24", features = ["v1_32"] }
schemars = "0.8"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
