[package]
name = "vil_streaming_rag"
version = "0.1.0"
edition = "2021"
description = "VIL Streaming RAG (D17) — chunk, embed, and index documents as they stream in real-time"

[dependencies]
vil_tokenizer   = { path = "../vil_tokenizer" }
vil_sdk         = { path = "../vil_sdk" }
vil_server_core = { path = "../vil_server_core" }
vil_server      = { path = "../vil_server" }
vil_macros      = { path = "../vil_macros" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
async-trait = "0.1"
axum = { version = "0.7", features = ["json"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
