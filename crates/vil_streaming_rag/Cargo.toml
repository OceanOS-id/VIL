[package]
name = "vil_streaming_rag"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "VIL Streaming RAG (D17) — chunk, embed, and index documents as they stream in real-time"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
vil_tokenizer   = { version = "0.1.0", path = "../vil_tokenizer" }
vil_sdk         = { version = "0.1.0", path = "../vil_sdk" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }
vil_server      = { version = "0.1.0", path = "../vil_server" }
vil_macros      = { version = "0.1.0", path = "../vil_macros" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
async-trait = "0.1"
axum = { version = "0.7", features = ["json"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
