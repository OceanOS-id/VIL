[package]
name = "vil_engine"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "VIL Core Engine - Unified Binary Wrapper (Closed Source Strategry)"

[lib]
name = "vil_engine"
# SOURCE MODE (default): crate-type = rlib saja — tidak ada .a file yang di-generate
# Gunakan mode ini saat `cargo build` dari source workspace
crate-type = ["staticlib", "rlib"]
# ─────────────────────────────────────────────────────────────────────────────

[dependencies]
vil_types = { version = "0.2", path = "../vil_types" }
vil_rt = { version = "0.2", path = "../vil_rt" }
vil_shm = { version = "0.2", path = "../vil_shm" }
vil_queue = { version = "0.2", path = "../vil_queue" }
vil_registry = { version = "0.2", path = "../vil_registry" }
vil_obs = { version = "0.2", path = "../vil_obs" }
