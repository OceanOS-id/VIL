[package]
name = "vil_reranker"
version = "0.1.0"
edition = "2021"
description = "VIL Reranker Engine — keyword, cross-encoder, and Reciprocal Rank Fusion reranking for RAG retrieval"

[dependencies]
vil_llm = { path = "../vil_llm" }
vil_embedder = { path = "../vil_embedder" }
vil_sdk = { path = "../vil_sdk" }
vil_server_core = { path = "../vil_server_core" }
vil_server = { path = "../vil_server" }
vil_macros = { path = "../vil_macros" }
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
