[package]
name = "vil_reranker"
version = "0.1.2"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "VIL Reranker Engine — keyword, cross-encoder, and Reciprocal Rank Fusion reranking for RAG retrieval"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
vil_llm = { version = "0.1.0", path = "../vil_llm" }
vil_embedder = { version = "0.1.0", path = "../vil_embedder" }
vil_sdk = { version = "0.1.0", path = "../vil_sdk" }
vil_server_core = { version = "0.1.0", path = "../vil_server_core" }
vil_server = { version = "0.1.0", path = "../vil_server" }
vil_macros = { version = "0.1.0", path = "../vil_macros" }
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
