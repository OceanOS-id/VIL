[package]
name = "vil_mq_mqtt"
version = "0.1.0"
edition = "2021"
description = "VIL MQTT Adapter — publish, subscribe, Tri-Lane bridge"
license = "Apache-2.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
rumqttc = "0.24"
vil_log = { workspace = true }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
bytes = "1.0"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
