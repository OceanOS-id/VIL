[package]
name = "vil_mq_mqtt"
version = "0.1.0"
edition = "2021"
description = "VIL MQTT Adapter — publish, subscribe, Tri-Lane bridge"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "MIT OR Apache-2.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
rumqttc = "0.24"
vil_log = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = "1.0"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
