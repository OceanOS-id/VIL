[package]
name = "vil_tensor_shm"
description = "Zero-copy tensor serving via SHM-mapped buffers — eliminates serialization between inference stages"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
vil_macros = { version = "0.4", path = "../vil_macros" }
vil_server_core = { version = "0.4", path = "../vil_server_core" }
vil_sdk = { version = "0.4", path = "../vil_sdk" }
vil_server = { version = "0.4", path = "../vil_server" }
axum = { version = "0.7", features = ["macros"] }

[dev-dependencies]
