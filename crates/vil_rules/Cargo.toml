[package]
name = "vil_rules"
version.workspace = true
edition = "2021"
description = "VIL Business Rule Engine — YAML if/then rules and decision tables"
license = "MIT OR Apache-2.0"

[dependencies]
vil_expr = { version = "0.3", path = "../vil_expr" }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
serde_json = "1.0"
