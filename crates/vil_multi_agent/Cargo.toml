[package]
name = "vil_multi_agent"
version = "0.1.0"
edition = "2021"
description = "VIL Multi-Agent System — compile agent graphs to state machines with typed inter-agent channels"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"

[dependencies]
vil_llm          = { version = "0.1.0", path = "../vil_llm" }
vil_agent        = { version = "0.1.0", path = "../vil_agent" }
vil_macros       = { version = "0.1.0", path = "../vil_macros" }
vil_server_core  = { version = "0.1.0", path = "../vil_server_core" }
vil_sdk          = { version = "0.1.0", path = "../vil_sdk" }
vil_server       = { version = "0.1.0", path = "../vil_server" }
vil_log = { workspace = true }
tracing = { workspace = true }

tokio      = { version = "1", features = ["full"] }
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmp-serde = "1.3"
async-trait = "0.1"
dashmap    = "5.5"
axum       = { version = "0.7", features = ["json"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
