[package]
name = "vil_multi_agent"
version = "0.1.0"
edition = "2021"
description = "VIL Multi-Agent System — compile agent graphs to state machines with typed inter-agent channels"

[dependencies]
vil_llm          = { path = "../vil_llm" }
vil_agent        = { path = "../vil_agent" }
vil_macros       = { path = "../vil_macros" }
vil_server_core  = { path = "../vil_server_core" }
vil_sdk          = { path = "../vil_sdk" }
vil_server       = { path = "../vil_server" }

tokio      = { version = "1", features = ["full"] }
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tracing    = "0.1"
dashmap    = "5.5"
axum       = { version = "0.7", features = ["json"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
