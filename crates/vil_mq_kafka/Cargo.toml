[package]
name = "vil_mq_kafka"
version = "0.1.0"
edition = "2021"
description = "VIL Kafka Adapter — producer, consumer, Tri-Lane bridge"
repository = "https://github.com/OceanOS-id/VIL"
homepage = "https://vastar.id/products/vil"
documentation = "https://vastar.id/docs/vil"
readme = "README.md"
license = "Apache-2.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
rdkafka = { version = "0.36", features = ["cmake-build"] }
vil_log = { workspace = true }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dashmap = "5.5"
bytes = "1.0"
futures = "0.3"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
