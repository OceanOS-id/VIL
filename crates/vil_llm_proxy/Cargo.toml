[package]
name = "vil_llm_proxy"
version = "0.1.0"
edition = "2021"
description = "VIL LLM Proxy — streaming proxy with routing, caching, rate limiting"

[dependencies]
vil_llm          = { path = "../vil_llm" }
vil_macros       = { path = "../vil_macros" }
vil_server_core  = { path = "../vil_server_core" }
vil_sdk          = { path = "../vil_sdk" }
vil_server       = { path = "../vil_server" }
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dashmap = "5.5"
tracing = "0.1"
async-trait = "0.1"
