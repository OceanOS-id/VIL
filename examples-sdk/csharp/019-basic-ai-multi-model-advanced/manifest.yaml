vil_version: "6.0.0"
name: AdvancedMultiModelRouterPipeline
port: 3086
token: shm

nodes:
  advanced_router_sink:
    type: http_sink
    port: 3086
    path: "/route-advanced"
  advanced_router_source:
    type: http_source
    url: "http://127.0.0.1:4545/v1/chat/completions"
    format: sse
    json_tap: "choices[0].delta.content"
    dialect: openai

routes:
  - from: sink.trigger_out
    to: source.trigger_in
    mode: LoanWrite
  - from: source.response_data_out
    to: sink.response_data_in
    mode: LoanWrite
  - from: source.response_ctrl_out
    to: sink.response_ctrl_in
    mode: Copy
