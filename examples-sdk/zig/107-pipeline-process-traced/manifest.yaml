vil_version: "6.0.0"
name: SupplyChainTrackedPipeline
port: 3107
token: shm

nodes:
  tracking_sink:
    type: http_sink
    port: 3107
    path: "/traced"
  supply_chain_source:
    type: http_source
    url: "http://localhost:18081/api/v1/credits/stream"
    format: sse

routes:
  - from: sink.trigger_out
    to: source.trigger_in
    mode: LoanWrite
  - from: source.tracking_data_out
    to: sink.tracking_data_in
    mode: LoanWrite
  - from: source.delivery_ctrl_out
    to: sink.delivery_ctrl_in
    mode: Copy
