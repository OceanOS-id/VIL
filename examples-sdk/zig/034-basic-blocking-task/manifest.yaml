vil_version: "6.0.0"
name: credit-risk-scoring-engine
port: 8080
token: shm
mode: server

services:
  - name: risk-engine
    prefix: /api/risk-engine
    endpoints:
      - method: POST
        path: /risk/assess
        handler: assess_risk
      - method: GET
        path: /risk/health
        handler: risk_health
