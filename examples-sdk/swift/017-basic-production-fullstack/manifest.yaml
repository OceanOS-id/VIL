vil_version: "6.0.0"
name: production-fullstack
port: 8080
token: shm
mode: server

services:
  - name: fullstack
    prefix: /api/fullstack
    endpoints:
      - method: GET
        path: /stack
        handler: stack_info
        impl:
          mode: inline
          code: |
            let config = FullServerConfig::default();

            let mut subsystems = std::collections::HashMap::new();
            subsystems.insert(
                "rest",
                SubsystemFeatures {
                    framework: Some("Axum 0.7"),
                    orm: None,
                    enabled: None,
                    port: None,
                    playground: None,
                    pool_size: None,
                    mode: None,
                    channels: None,
                    discovery: None,
                    features: vec![
                        "JSON extraction",
                        "path params",
                        "query params",
                        "validation",
                    ],
                },
            );
            subsystems.insert(
                "grpc",
                SubsystemFeatures {
                    framework: Some("tonic 0.12"),
                    enabled: Some(config.grpc.enabled),
                    port: Some(config.grpc.port),
                    orm: None,
                    playground: None,
                    pool_size: None,
                    mode: None,
                    channels: None,
                    discovery: None,
                    features: vec!["health check", "per-service metrics", "dual-port"],
                },
            );
            subsystems.insert(
                "nats",
                SubsystemFeatures {
                    framework: None,
                    orm: None,
                    enabled: None,
                    port: None,
                    playground: None,
                    pool_size: None,
                    mode: None,
                    channels: None,
                    discovery: None,
                    features: vec!["pub/sub", "JetStream", "KV Store", "Tri-Lane bridge"],
                },
            );
            subsystems.insert(
                "database",
                SubsystemFeatures {
                    orm: Some("SeaORM + SQLx"),
                    framework: None,
                    enabled: None,
                    port: None,
                    playground: None,
                    pool_size: None,
                    mode: None,
                    channels: None,
                    discovery: None,
                    features: vec![
                        "VilEntity derive",
                        "DbProvider (1 vtable)",
                        "DatasourceRegistry",
                        "VilCache",
                    ],
                },
            );
            subsystems.insert(
                "graphql",
                SubsystemFeatures {
                    framework: Some("async-graphql 7"),
                    enabled: Some(config.graphql.enabled),
                    playground: Some(config.graphql.playground),
                    orm: None,
                    port: None,
                    pool_size: None,
                    mode: None,
                    channels: None,
                    discovery: None,
                    features: vec![
                        "auto-schema from VilEntity",
                        "CRUD resolvers",
                        "subscriptions",
                    ],
                },
            );
            subsystems.insert(
                "shm",
                SubsystemFeatures {
                    enabled: Some(config.shm.enabled),
                    pool_size: Some(config.shm.pool_size.clone()),
                    framework: None,
                    orm: None,
                    port: None,
                    playground: None,
                    mode: None,
                    channels: None,
                    discovery: None,
                    features: vec!["zero-copy IPC", "query cache", "ShmSlice extractors"],
                },
            );
            subsystems.insert(
                "mesh",
                SubsystemFeatures {
                    mode: Some(config.mesh.mode.clone()),
                    channels: Some(vec!["trigger", "data", "control"]),
                    discovery: Some(config.mesh.discovery.mode.clone()),
                    framework: None,
                    orm: None,
                    enabled: None,
                    port: None,
                    playground: None,
                    pool_size: None,
                    features: vec![],
                },
            );

            VilResponse::ok(StackInfoResponse {
                server: ServerSummary {
                    name: config.server.name.clone(),
                    port: config.server.port,
                    metrics_port: config.server.metrics_port,
                    workers: if config.server.workers == 0 {
                        "auto (num_cpus)".to_string()
                    } else {
                        config.server.workers.to_string()
                    },
                    max_body_size: config.server.max_body_size.clone(),
                },
                subsystems,
                crate_count: 21,
                total_tests: 245,
            })
      - method: GET
        path: /config
        handler: full_config
        impl:
          mode: inline
          code: |
            let config = FullServerConfig::default();

            VilResponse::ok(FullConfigResponse {
                description: "Full FullServerConfig from vil_server_config",
                sections: vec![
                    ConfigSection {
                        name: "server",
                        controls: "Host, port, workers, timeouts, body size, graceful shutdown",
                    },
                    ConfigSection {
                        name: "logging",
                        controls: "Log level, format (text/json), per-module overrides",
                    },
                    ConfigSection {
                        name: "shm",
                        controls: "Shared memory pool, query cache, reset threshold",
                    },
                    ConfigSection {
                        name: "mesh",
                        controls: "Tri-Lane channels (trigger/data/control), discovery mode",
                    },
                    ConfigSection {
                        name: "services",
                        controls: "Service definitions with visibility (public/internal)",
                    },
                    ConfigSection {
                        name: "middleware",
                        controls: "CORS, compression, timeouts, tracing, security headers, HSTS",
