                    ConfigSection {
                        name: "observability",
                        controls: "Prometheus metrics, health checks, readiness probes",
                    },
                    ConfigSection {
                        name: "performance",
                        controls: "Thread pool sizing, benchmark baselines",
                    },
                    ConfigSection {
                        name: "grpc",
                        controls: "gRPC server port, health service, per-service metrics",
