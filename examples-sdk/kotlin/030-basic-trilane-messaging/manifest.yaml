vil_version: "6.0.0"
name: ecommerce-order-pipeline
port: 8080
token: shm
mode: server

services:
  - name: gateway
    prefix: /api/gateway
  - name: fulfillment
    prefix: /api/fulfillment
    endpoints:
      - method: GET
        path: /status
        handler: fulfillment_status
        impl:
          mode: inline
          code: |
            VilResponse::ok(FulfillmentStatus {
                service: "fulfillment",
                role: "Internal warehouse service — receives orders via Tri-Lane mesh",
                warehouse_region: "us-west-2",
                capacity_percent: 73,
            })
