vil_version: "6.0.0"
name: websocket-chat
port: 8080
token: shm
mode: server

services:
  - name: chat
    prefix: /api/chat
    endpoints:
      - method: GET
        path: /
        handler: index
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /ws
        handler: ws_handler
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /stats
        handler: stats
        impl:
          mode: stub
          response: '{"ok": true}'
