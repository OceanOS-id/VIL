vil_version: "6.0.0"
name: CreditQualityMonitorPipeline
port: 3082
token: shm

nodes:
  quality_monitor_sink:
    type: http_sink
    port: 3082
    path: "/quality-check"
  quality_credit_source:
    type: http_source
    format: json

routes:
  - from: sink.trigger_out
    to: source.trigger_in
    mode: LoanWrite
  - from: source.response_data_out
    to: sink.response_data_in
    mode: LoanWrite
  - from: source.response_ctrl_out
    to: sink.response_ctrl_in
    mode: Copy
