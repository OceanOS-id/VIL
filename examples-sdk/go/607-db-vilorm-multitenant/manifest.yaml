vil_version: "6.0.0"
name: vilorm-multitenant
port: 8087
token: shm
mode: server

services:
  - name: saas
    prefix: /api/saas
    endpoints:
      - method: POST
        path: /tenants
        handler: create_tenant
      - method: GET
        path: /tenants/:id
        handler: get_tenant
      - method: PUT
        path: /tenants/:id
        handler: update_tenant
      - method: POST
        path: /tenants/:id/users
        handler: add_user
      - method: GET
        path: /tenants/:id/users
        handler: list_users
      - method: POST
        path: /tenants/:id/settings
        handler: upsert_setting
      - method: GET
        path: /tenants/:id/settings
        handler: list_settings
      - method: GET
        path: /tenants/:id/stats
        handler: tenant_stats
