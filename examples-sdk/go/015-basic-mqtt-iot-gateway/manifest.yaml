vil_version: "6.0.0"
name: mqtt-iot-gateway
port: 8080
token: shm
mode: server

services:
  - name: mqtt-iot
    prefix: /api/mqtt-iot
    endpoints:
      - method: POST
        path: /sensors/data
        handler: receive_sensor_data
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /sensors
        handler: list_sensors
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /mqtt/config
        handler: mqtt_config
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /mqtt/topics
        handler: mqtt_topics
        impl:
          mode: stub
          response: '{"ok": true}'
  - name: root
    prefix: /api/root
