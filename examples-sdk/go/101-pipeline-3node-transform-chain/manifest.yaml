vil_version: "6.0.0"
name: TransformChainPipeline
port: 3090
token: shm

nodes:
  transform_gateway:
    type: http_sink
    port: 3090
    path: "/transform"
  chained_transform_source:
    type: http_source
    url: "http://localhost:18081/api/v1/credits/ndjson?count=100"
    format: json

routes:
  - from: sink.trigger_out
    to: source.trigger_in
    mode: LoanWrite
  - from: source.response_data_out
    to: sink.response_data_in
    mode: LoanWrite
  - from: source.response_ctrl_out
    to: sink.response_ctrl_in
    mode: Copy
