vil_version: "6.0.0"
name: payment-gateway-ha
port: 8080
token: shm
mode: server

services:
  - name: primary
    prefix: /api/primary
    endpoints:
      - method: GET
        path: /health
        handler: primary_health
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /charge
        handler: primary_charge
        impl:
          mode: stub
          response: '{"ok": true}'
  - name: backup
    prefix: /api/backup
    endpoints:
      - method: GET
        path: /health
        handler: backup_health
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /charge
        handler: backup_charge
        impl:
          mode: stub
          response: '{"ok": true}'
