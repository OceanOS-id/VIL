vil_version: "6.0.0"
name: sidecar-python-example
port: 8080
token: shm
mode: server

services:
  - name: fraud
    prefix: /api/fraud
    endpoints:
      - method: GET
        path: /status
        handler: fraud_status
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /check
        handler: fraud_check
        impl:
          mode: stub
          response: '{"ok": true}'
  - name: root
    prefix: /api/root
    endpoints:
      - method: GET
        path: /
        handler: index
        impl:
          mode: stub
          response: '{"ok": true}'
