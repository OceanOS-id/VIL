vil_version: "6.0.0"
name: vilorm-showcase
port: 8080
token: shm
mode: server

services:
  - name: blog
    prefix: /api/blog
    endpoints:
      - method: POST
        path: /authors
        handler: create_author
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /authors
        handler: list_authors
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /posts
        handler: list_posts
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /posts
        handler: create_post
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /posts/:id
        handler: get_post
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: PUT
        path: /posts/:id
        handler: update_post
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: DELETE
        path: /posts/:id
        handler: delete_post
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /tags
        handler: create_tag
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /stats
        handler: blog_stats
        impl:
          mode: stub
          response: '{"ok": true}'
