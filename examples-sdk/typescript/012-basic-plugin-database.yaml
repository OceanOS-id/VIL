vil_version: "6.0.0"
name: plugin-database
port: 8080
token: shm
mode: server

services:
  - name: plugin-db
    prefix: /api/plugin-db
    endpoints:
      - method: GET
        path: /
        handler: index
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /plugins
        handler: list_plugins
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /config
        handler: show_config
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /products
        handler: list_products
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /tasks
        handler: create_task
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /tasks
        handler: list_tasks
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /pool-stats
        handler: pool_stats
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /redis-ping
        handler: redis_ping
        impl:
          mode: stub
          response: '{"ok": true}'
