vil_version: "6.0.0"
name: hybrid-pipeline
port: 8080
token: shm
mode: server

services:
  - name: pipeline
    prefix: /api/pipeline
    endpoints:
      - method: GET
        path: /
        handler: index
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /validate
        handler: validate_order
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /price
        handler: calculate_price
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /fraud
        handler: fraud_check
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: POST
        path: /order
        handler: process_order
        impl:
          mode: stub
          response: '{"ok": true}'
