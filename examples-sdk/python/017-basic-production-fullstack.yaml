vil_version: "6.0.0"
name: production-fullstack
port: 8080
token: shm
mode: server

services:
  - name: fullstack
    prefix: /api/fullstack
    endpoints:
      - method: GET
        path: /stack
        handler: stack_info
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /config
        handler: full_config
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /sprints
        handler: sprints
        impl:
          mode: stub
          response: '{"ok": true}'
      - method: GET
        path: /middleware
        handler: middleware_info
        impl:
          mode: stub
          response: '{"ok": true}'
  - name: admin
    prefix: /api/admin
    endpoints:
      - method: GET
        path: /config
        handler: full_config
        impl:
          mode: stub
          response: '{"ok": true}'
  - name: root
    prefix: /api/root
