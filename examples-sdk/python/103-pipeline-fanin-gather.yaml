vil_version: "6.0.0"
name: CreditGatherPipeline
port: 3093
token: shm

nodes:
  credit_gather_sink:
    type: http_sink
    port: 3093
    path: "/gather"
  credit_source:
    type: http_source
    url: "http://localhost:18081/api/v1/credits/ndjson?count=100"
    format: json
  inventory_gather_sink:
    type: http_sink
    port: 3094
    path: "/inventory"
  inventory_source:
    type: http_source
    url: "http://localhost:18092/api/v1/products"

routes:
  - from: credit_sink.trigger_out
    to: credit_source.trigger_in
    mode: LoanWrite
  - from: credit_source.response_data_out
    to: credit_sink.response_data_in
    mode: LoanWrite
  - from: credit_source.response_ctrl_out
    to: credit_sink.response_ctrl_in
    mode: Copy
  - from: inventory_sink.trigger_out
    to: inventory_source.trigger_in
    mode: LoanWrite
  - from: inventory_source.response_data_out
    to: inventory_sink.response_data_in
    mode: LoanWrite
  - from: inventory_source.response_ctrl_out
    to: inventory_sink.response_ctrl_in
    mode: Copy
