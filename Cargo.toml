[workspace.package]
edition = "2021"
version = "0.1.0"
license = "Apache-2.0"
authors = ["VIL Community"]

[workspace.dependencies]
# Core runtime
vil_types        = { path = "crates/vil_types" }
vil_shm          = { path = "crates/vil_shm" }
vil_queue        = { path = "crates/vil_queue" }
vil_registry     = { path = "crates/vil_registry" }
vil_rt           = { path = "crates/vil_rt" }
vil_obs          = { path = "crates/vil_obs" }
vil_net          = { path = "crates/vil_net" }
vil_engine       = { path = "crates/vil_engine" }

# Semantic compiler
vil_ir           = { path = "crates/vil_ir" }
vil_diag         = { path = "crates/vil_diag" }
vil_validate     = { path = "crates/vil_validate" }
vil_macros       = { path = "crates/vil_macros" }
vil_codegen_rust = { path = "crates/vil_codegen_rust" }
vil_codegen_c    = { path = "crates/vil_codegen_c" }

# Tooling
vil_cli          = { path = "crates/vil_cli" }
vil_ffi          = { path = "crates/vil_ffi" }
vil_new_http     = { path = "crates/vil_new_http" }

# SDK & extensions
vil_sdk          = { path = "crates/vil_sdk" }
vil_topo         = { path = "crates/vil_topo" }
vil_capsule      = { path = "crates/vil_capsule" }

# VIL Server
vil_server       = { path = "crates/vil_server" }
vil_server_core  = { path = "crates/vil_server_core" }
vil_server_web   = { path = "crates/vil_server_web" }
vil_server_config = { path = "crates/vil_server_config" }
vil_server_mesh  = { path = "crates/vil_server_mesh" }
vil_server_auth  = { path = "crates/vil_server_auth" }
vil_server_db    = { path = "crates/vil_server_db" }
vil_server_test  = { path = "crates/vil_server_test" }
vil_server_macros = { path = "crates/vil_server_macros" }

# Common dependencies
serde              = { version = "1.0", features = ["derive"] }
serde_json         = "1.0"
serde_yaml         = "0.9"
dashmap            = "5.5"
memmap2            = "0.9"
nix                = { version = "0.27", features = ["fs", "mman", "event"] }
tokio              = { version = "1", features = ["full"] }
axum               = { version = "0.7", features = ["macros"] }
tower              = { version = "0.4" }
tower-http         = { version = "0.5", features = ["cors", "trace", "compression-gzip", "limit", "fs"] }
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# =============================================================================
# Release Profile — Optimized for community distribution
# =============================================================================
[profile.release]
opt-level       = 3
lto             = "thin"
codegen-units   = 16
debug           = false
overflow-checks = false

# =============================================================================
# Dev Profile — For local development
# =============================================================================
[profile.dev]
opt-level       = 0
debug           = true
