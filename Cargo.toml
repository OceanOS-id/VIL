# =============================================================================
# VIL Full Source Community Workspace
# =============================================================================
# This is the FULL source code workspace for community adoption.
# ALL crates and examples are exposed - no IP protection.
#
# This workspace contains everything needed to build, run, and extend VIL.
# =============================================================================

